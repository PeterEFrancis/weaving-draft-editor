<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Weaving Draft Tool</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  body {
    background: white;
  }

  table.draft {
    border-collapse: collapse;
    margin-top: 10px;
  }

  td {
    padding: 0;
    vertical-align: top;
  }

  .grid {
    display: grid;
    gap: 2px;
  }

  button.cell {
    width: 20px;
    height: 20px;
    border: 1px solid #ddd;
    padding: 0;
    background: white;
  }

  .on {
    background: black !important;
  }

  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center; /* 🔥 centers everything */
    flex-wrap: wrap;
  }

  table, tr, td {
    border: 2px solid black;
  }
</style>
</head>

<body class="p-2">
  <h1 class="py-5 text-center">Weaving Draft Editor</h1>

<div class="controls py-4">
  <span>Shafts</span>
  <input id="shafts" class="form-control form-control-sm" style="width:80px" type="number" value="4">

  <span>Treadles</span>
  <input id="treadles" class="form-control form-control-sm" style="width:80px" type="number" value="4">

  <span>Warp</span>
  <input id="warp" class="form-control form-control-sm" style="width:100px" type="number" value="16">

  <span>Picks</span>
  <input id="picks" class="form-control form-control-sm" style="width:100px" type="number" value="16">

  <button class="btn btn-dark btn-sm" onclick="resetAll()">Reset</button>
</div>

<table class="draft my-5 m-auto">
  <tr>
    <td><div id="threading" class="grid"></div></td>
    <td><div id="tieup" class="grid"></div></td>
  </tr>
  <tr>
    <td><div id="drawdown" class="grid"></div></td>
    <td><div id="treadling" class="grid"></div></td>
  </tr>
</table>

<script>
let shafts = 4, treadles = 4, warp = 16, picks = 16;
let threading = [];
let treadling = [];
let tieup = [];

function init() {
  threading = Array.from({length: shafts}, () => Array(warp).fill(0));
  treadling = Array.from({length: picks}, () => Array(treadles).fill(0));
  tieup = Array.from({length: treadles}, () => Array(shafts).fill(0));
  renderAll();
}

function resetAll() {
  shafts = +document.getElementById("shafts").value;
  treadles = +document.getElementById("treadles").value;
  warp = +document.getElementById("warp").value;
  picks = +document.getElementById("picks").value;
  init();
}

function resizeFromControls() {
  const newShafts = +document.getElementById("shafts").value;
  const newTreadles = +document.getElementById("treadles").value;
  const newWarp = +document.getElementById("warp").value;
  const newPicks = +document.getElementById("picks").value;

  threading = resizeThreading(threading, shafts, newShafts, warp, newWarp);
  treadling = resizeTreadling(treadling, picks, newPicks, treadles, newTreadles);
  tieup = resizeTieup(tieup, treadles, newTreadles, shafts, newShafts);

  shafts = newShafts;
  treadles = newTreadles;
  warp = newWarp;
  picks = newPicks;

  renderAll();
}

function resizeThreading(old, oldS, newS, oldW, newW) {
  const result = Array.from({length: newS}, () => Array(newW).fill(0));
  for (let s = 0; s < Math.min(oldS, newS); s++) {
    for (let i = 0; i < Math.min(oldW, newW); i++) {
      result[s][i] = old[s]?.[i] || 0;
    }
  }
  return result;
}

function resizeTreadling(old, oldP, newP, oldT, newT) {
  const result = Array.from({length: newP}, () => Array(newT).fill(0));
  for (let j = 0; j < Math.min(oldP, newP); j++) {
    for (let t = 0; t < Math.min(oldT, newT); t++) {
      result[j][t] = old[j]?.[t] || 0;
    }
  }
  return result;
}

function resizeTieup(old, oldT, newT, oldS, newS) {
  const result = Array.from({length: newT}, () => Array(newS).fill(0));
  for (let t = 0; t < Math.min(oldT, newT); t++) {
    for (let s = 0; s < Math.min(oldS, newS); s++) {
      result[t][s] = old[t]?.[s] || 0;
    }
  }
  return result;
}

document.querySelectorAll("input").forEach(input => {
  input.addEventListener("change", resizeFromControls);
});

function renderAll() {
  renderThreading();
  renderTieup();
  renderTreadling();
  renderDrawdown();
}

function renderThreading() {
  const div = document.getElementById("threading");
  div.innerHTML = "";
  div.style.gridTemplateColumns = `repeat(${warp}, 20px)`;

  for (let s = shafts - 1; s >= 0; s--) {
    for (let i = 0; i < warp; i++) {
      const b = document.createElement("button");
      b.className = "cell " + (threading[s][i] ? "on" : "");

      b.onclick = () => {
        if (threading[s][i]) {
          threading[s][i] = 0;
        } else {
          for (let k = 0; k < shafts; k++) threading[k][i] = 0;
          threading[s][i] = 1;
        }
        renderAll();
      };

      div.appendChild(b);
    }
  }
}

function renderTieup() {
  const div = document.getElementById("tieup");
  div.innerHTML = "";
  div.style.gridTemplateColumns = `repeat(${treadles}, 20px)`;

  for (let s = shafts - 1; s >= 0; s--) {
    for (let t = 0; t < treadles; t++) {
      const b = document.createElement("button");
      b.className = "cell " + (tieup[t][s] ? "on" : "");

      b.onclick = () => {
        tieup[t][s] ^= 1;
        renderAll();
      };

      div.appendChild(b);
    }
  }
}

function renderTreadling() {
  const div = document.getElementById("treadling");
  div.innerHTML = "";
  div.style.gridTemplateColumns = `repeat(${treadles}, 20px)`;

  for (let j = 0; j < picks; j++) {
    for (let t = 0; t < treadles; t++) {
      const b = document.createElement("button");
      b.className = "cell " + (treadling[j][t] ? "on" : "");

      b.onclick = () => {
        treadling[j][t] ^= 1;
        renderAll();
      };

      div.appendChild(b);
    }
  }
}

function renderDrawdown() {
  const div = document.getElementById("drawdown");
  div.innerHTML = "";
  div.style.gridTemplateColumns = `repeat(${warp}, 20px)`;

  for (let j = 0; j < picks; j++) {
    for (let i = 0; i < warp; i++) {

      let shaft = threading.findIndex(r => r[i] === 1);

      let val = 0;
      if (shaft !== -1) {
        for (let t = 0; t < treadles; t++) {
          if (treadling[j][t] && tieup[t][shaft]) {
            val = 1;
            break;
          }
        }
      }

      const b = document.createElement("button");
      b.className = "cell " + (val ? "on" : "");
      div.appendChild(b);
    }
  }
}

init();
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
