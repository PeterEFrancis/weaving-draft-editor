<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drafter</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
  :root {
    --bg-cream: #f7f1e3;
    --bg-warm: #ead8bf;
    --ink: #2f241d;
    --accent: #aa4a2b;
    --accent-dark: #7a321c;
    --card: rgba(255, 252, 245, 0.88);
    --panel-bg: #fcf8f0;
    --line: rgba(47, 36, 29, 0.12);
    --cell-size: 20px;
    --cell-gap: 2px;
    --grid-gap: 0px;
    --preview-cell-size: 10px;
    --preview-render-scale: 2;
    --control-gap: calc(5 * var(--cell-gap));
    --toolbar-offset: var(--cell-gap);
    --insert-gap: calc(var(--cell-size) / 20);
    --insert-btn-width: calc((var(--cell-size) - var(--insert-gap)) / 2);
    --insert-btn-height: calc((var(--cell-size) - var(--insert-gap)) / 2);
    --insert-btn-nudge: calc(var(--cell-size) * 0.185);
    --toolbar-font-size: calc(var(--cell-size) / 2);
  }

  body {
    min-height: 100vh;
    color: var(--ink);
    background:
      radial-gradient(circle at top left, rgba(170, 74, 43, 0.12), transparent 34%),
      radial-gradient(circle at right 20%, rgba(84, 115, 76, 0.12), transparent 28%),
      linear-gradient(180deg, var(--bg-cream) 0%, #fdfaf4 46%, var(--bg-warm) 100%);
  }

  .page-shell {
    max-width: 1240px;
  }

  .hero-card,
  .editor-card,
  .controls-card {
    background: var(--panel-bg);
    border: 1px solid var(--line);
    border-radius: 1.5rem;
    box-shadow: 0 1.2rem 3rem rgba(47, 36, 29, 0.08);
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.45rem 0.8rem;
    border-radius: 999px;
    background: rgba(170, 74, 43, 0.1);
    color: var(--accent-dark);
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .page-title {
    font-size: clamp(2.8rem, 6vw, 4.8rem);
    line-height: 0.95;
    letter-spacing: -0.04em;
  }

  .lead-copy {
    max-width: 44rem;
    font-size: 1.05rem;
  }

  .btn-drafter {
    padding: 0.68rem 0.95rem;
    border: 0;
    border-radius: 0.85rem;
    background: linear-gradient(135deg, var(--accent), #c87137);
    color: white;
    font-size: 0.92rem;
    font-weight: 700;
    box-shadow: 0 0.9rem 2rem rgba(170, 74, 43, 0.22);
  }

  .btn-drafter:hover,
  .btn-drafter:focus {
    background: linear-gradient(135deg, var(--accent-dark), var(--accent));
    color: white;
  }

  .btn-soft {
    padding: 0.68rem 0.95rem;
    border-radius: 0.85rem;
    border: 1px solid rgba(47, 36, 29, 0.14);
    background: rgba(255, 255, 255, 0.6);
    color: var(--ink);
    font-size: 0.92rem;
    font-weight: 600;
  }

  .btn-soft:hover,
  .btn-soft:focus {
    background: rgba(255, 255, 255, 0.9);
    color: var(--ink);
  }

  .controls-toolbar {
    row-gap: 0.7rem;
  }

  .control-actions-panel {
    margin-bottom: 1.1rem;
    padding-bottom: 1.1rem;
    border-bottom: 1px solid rgba(47, 36, 29, 0.08);
  }

  .control-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    justify-content: flex-end;
  }

  .control-actions .btn {
    flex: 1 1 auto;
    min-height: 2.65rem;
  }

  .control-label {
    display: block;
    margin-bottom: 0.3rem;
    color: var(--accent-dark);
    font-size: 0.74rem;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .form-control {
    min-height: 2.65rem;
    padding: 0.5rem 0.7rem;
    border-radius: 0.85rem;
    border-color: rgba(47, 36, 29, 0.12);
    background: rgba(255, 255, 255, 0.92);
    color: var(--ink);
    box-shadow: none;
    font-size: 0.95rem;
  }

  .form-control:focus {
    border-color: rgba(170, 74, 43, 0.45);
    box-shadow: 0 0 0 0.25rem rgba(170, 74, 43, 0.12);
  }

  .pattern-colors-panel {
    margin-top: 1.25rem;
    padding-top: 1.25rem;
    border-top: 1px solid rgba(47, 36, 29, 0.08);
  }

  .pattern-colors-header {
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.85rem;
  }

  .pattern-colors-title {
    flex: 0 1 17rem;
  }

  .pattern-colors-copy {
    max-width: 16rem;
    font-size: 0.82rem;
    line-height: 1.3;
  }

  .pattern-colors-tools {
    display: flex;
    flex: 1 1 24rem;
    flex-wrap: wrap;
    justify-content: flex-end;
    align-items: flex-start;
    gap: 0.8rem;
    --pattern-color-control-height: 3.15rem;
  }

  .pattern-colors-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.8rem;
  }

  .pattern-color-item {
    position: relative;
    width: 3.5rem;
    height: var(--pattern-color-control-height);
    padding: 0;
    border: 2px solid rgba(47, 36, 29, 0.14);
    border-radius: 0.9rem;
    box-sizing: border-box;
    transition: border-color 140ms ease, transform 140ms ease;
    cursor: pointer;
    overflow: hidden;
  }

  .pattern-color-item.active {
    border-color: #c87137;
    border-width: 4px;
    transform: translateY(-1px);
  }

  .pattern-color-surface {
    position: absolute;
    inset: 0;
    border-radius: inherit;
    z-index: 0;
    pointer-events: none;
  }

  .pattern-color-input {
    position: absolute;
    width: 0;
    height: 0;
    opacity: 0;
    pointer-events: none;
  }

  .pattern-color-edit,
  .pattern-color-delete {
    position: absolute;
    right: 0.18rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1.22rem;
    height: 1.22rem;
    padding: 0;
    border: 0;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.82);
    color: rgba(47, 36, 29, 0.72);
    box-shadow: 0 0.1rem 0.35rem rgba(47, 36, 29, 0.16);
    z-index: 2;
  }

  .pattern-color-edit {
    bottom: 0.18rem;
  }

  .pattern-color-delete {
    top: 0.18rem;
    color: rgba(122, 50, 28, 0.82);
  }

  .pattern-color-edit:hover,
  .pattern-color-edit:focus-visible,
  .pattern-color-delete:hover,
  .pattern-color-delete:focus-visible {
    background: rgba(255, 255, 255, 0.94);
    color: rgba(47, 36, 29, 0.9);
    outline: none;
  }

  .pattern-color-delete:hover,
  .pattern-color-delete:focus-visible {
    color: rgba(122, 50, 28, 1);
  }

  .pattern-color-edit svg,
  .pattern-color-delete svg {
    width: 0.68rem;
    height: 0.68rem;
    display: block;
  }

  .pattern-color-add {
    height: var(--pattern-color-control-height);
    padding: 0 1rem;
    display: inline-flex;
    align-items: center;
    white-space: nowrap;
  }

  @media (max-width: 767.98px) {
    .pattern-colors-tools {
      justify-content: flex-start;
    }
  }

  .draft-stage {
    overflow: hidden;
    padding: 1.25rem;
    border-radius: 1.25rem;
    border: 1px solid rgba(47, 36, 29, 0.08);
    background: var(--panel-bg);
    container-type: inline-size;
  }

  .draft-stage-header {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    margin-bottom: 1rem;
  }

  .draft-stage h2 {
    font-size: 1.05rem;
    margin: 0;
  }

  .draft-grid-scroll {
    width: 100%;
    max-width: 100%;
    max-height: min(100cqw, calc(100dvh - 8rem));
    overflow: auto;
    scrollbar-gutter: stable both-edges;
  }

  .draft-stage-actions {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 0.35rem;
    margin-top: 0;
  }

  .draft-stage-zoom {
    display: inline-flex;
    align-items: center;
    gap: 0.15rem;
  }

  .draft-stage-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 1.9rem;
    height: 1.9rem;
    padding: 0;
    border: 0;
    background: transparent;
    box-shadow: none;
    color: rgba(47, 36, 29, 0.45);
    text-decoration: none;
    transition: color 140ms ease, opacity 140ms ease, transform 140ms ease;
  }

  .draft-stage-button:hover,
  .draft-stage-button:focus-visible {
    color: rgba(47, 36, 29, 0.72);
    outline: none;
    transform: translateY(-1px);
  }

  .draft-stage-button:disabled {
    color: rgba(47, 36, 29, 0.22);
    transform: none;
    cursor: default;
  }

  .draft-stage-button svg {
    width: 1.05rem;
    height: 1.05rem;
    display: block;
  }

  .draft-stage-zoom-button {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1;
  }

  .page-home-link {
    position: fixed;
    top: 1rem;
    left: 1rem;
    z-index: 40;
    background: rgba(252, 248, 240, 0.88);
    border: 1px solid rgba(47, 36, 29, 0.12);
    border-radius: 999px;
    color: rgba(47, 36, 29, 0.72);
  }

  .preview-stage {
    margin-top: 1.25rem;
    padding: 1.25rem;
    border-radius: 1.25rem;
    border: 1px solid rgba(47, 36, 29, 0.08);
    background: var(--panel-bg);
  }

  .preview-stage h2 {
    font-size: 1.05rem;
    margin: 0;
  }

  .preview-stage p {
    margin: 0;
  }

  .preview-scroll {
    overflow: hidden;
    margin-top: 1rem;
    padding: 0.75rem;
    border-radius: 1rem;
    background: #ffffff;
    border: 1px solid rgba(47, 36, 29, 0.08);
    min-height: clamp(260px, 48vh, 520px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .preview-canvas-wrap {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
  }

  .repeat-canvas {
    display: block;
    background: #ffffff;
    image-rendering: pixelated;
    max-width: 100%;
    max-height: 100%;
  }

  .preview-controls {
    display: flex;
    flex-wrap: nowrap;
    gap: 0.6rem;
    align-items: flex-end;
    justify-content: flex-end;
    margin-left: auto;
  }

  .preview-control {
    width: 82px;
  }

  .preview-color-control {
    width: 56px;
    min-width: 56px;
    height: 38px;
    padding: 0.2rem;
  }

  .preview-color-control::-webkit-color-swatch-wrapper {
    padding: 0;
  }

  .preview-color-control::-webkit-color-swatch {
    border: 0;
    border-radius: 0.55rem;
  }

  .preview-color-control::-moz-color-swatch {
    border: 0;
    border-radius: 0.55rem;
  }

  .preview-sett-control {
    width: 118px;
    min-width: 118px;
    padding: 0;
    accent-color: var(--accent);
  }

  .preview-controls > div {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .preview-mode-group {
    gap: 0.45rem;
  }

  .preview-mode-toggle {
    display: inline-flex;
    align-items: center;
    padding: 0.2rem;
    border-radius: 999px;
    border: 1px solid rgba(47, 36, 29, 0.12);
    background: rgba(255, 255, 255, 0.62);
    gap: 0.2rem;
  }

  .preview-mode-button {
    border: 0;
    background: transparent;
    color: rgba(47, 36, 29, 0.7);
    padding: 0.42rem 0.72rem;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 600;
    line-height: 1;
    white-space: nowrap;
  }

  .preview-mode-button.active {
    background: rgba(170, 74, 43, 0.14);
    color: var(--accent-dark);
    box-shadow: inset 0 0 0 1px rgba(170, 74, 43, 0.08);
  }

  .preview-mode-button:hover,
  .preview-mode-button:focus-visible {
    color: var(--ink);
    outline: none;
  }

  .preview-control-label {
    margin-bottom: 0.35rem;
    font-size: 0.72rem;
    white-space: nowrap;
  }

  table.draft {
    border-collapse: collapse;
    margin: 0 auto;
  }

  th {
    padding: 0;
    border: 0;
    font-weight: normal;
  }

  td {
    padding: 0;
    vertical-align: top;
    border: var(--cell-gap) solid var(--ink);
    background: rgba(255, 255, 255, 0.3);
  }

  .ghost-cell {
    border: 0 !important;
    background: transparent !important;
  }

  .grid {
    display: grid;
    gap: var(--grid-gap);
  }

  button.cell {
    position: relative;
    width: var(--cell-size);
    height: var(--cell-size);
    border: 1px solid rgba(47, 36, 29, 0.1);
    border-radius: 0;
    padding: 0;
    background: rgba(255, 255, 255, 0.94);
    transition: border-color 120ms ease, transform 120ms ease;
  }

  button.cell:hover {
    border-color: rgba(170, 74, 43, 0.42);
  }

  .cell-active {
    box-shadow: inset 0 0 0 1.2px rgba(47, 36, 29, 0.34);
  }

  .cell-structural-on {
    background: var(--ink) !important;
    border-color: var(--ink) !important;
  }

  .drawdown-cell {
    width: var(--cell-size);
    height: var(--cell-size);
    border: 1px solid rgba(47, 36, 29, 0.1);
    border-radius: 0;
    box-sizing: border-box;
    user-select: none;
    pointer-events: none;
  }

  .warp-toolbar {
    display: grid;
    gap: var(--grid-gap);
    margin: 0px;
    margin-left: calc(-1 * var(--insert-btn-nudge));
    width: fit-content;
  }

  .warp-insert-cell {
    display: flex;
    gap: var(--insert-gap);
    justify-content: center;
    align-items: center;
  }

  .insert-btn {
    width: var(--insert-btn-width);
    height: var(--insert-btn-height);
    font-size: var(--toolbar-font-size);
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 0;
    border-radius: 999px;
    background: transparent;
    color: var(--accent-dark);
    line-height: 1;
    cursor: pointer;
  }

  .insert-btn:hover {
    color: var(--accent);
    /*background: rgba(170, 74, 43, 0.08);*/
  }

  .pick-wrap {
    display: flex;
    align-items: flex-start;
  }

  .pick-toolbar {
    display: grid;
    gap: var(--grid-gap);
    margin-left: var(--toolbar-offset);
    margin-top: calc(-1 * var(--insert-btn-nudge));
    width: fit-content;
  }

  .pick-insert-cell {
    display: flex;
    flex-direction: column;
    gap: var(--insert-gap);
    align-items: center;
    justify-content: center;
    height: var(--cell-size);
  }

  @media (max-width: 991.98px) {
    .hero-card,
    .editor-card {
      padding: 1.5rem !important;
    }

    .draft-stage {
      padding: 0.9rem;
    }
  }

  @media print {
    @page {
      margin: 0.5in;
    }

    body {
      background: #ffffff !important;
    }

    body * {
      visibility: hidden !important;
    }

    .draft-print-area,
    .draft-print-area * {
      visibility: visible !important;
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }

    .draft-print-area {
      position: absolute;
      left: 0;
      top: 0;
      width: max-content;
      background: #ffffff !important;
    }

    .draft-stage {
      overflow: visible !important;
      padding: 0 !important;
      border: 0 !important;
      background: #ffffff !important;
    }

    .draft-grid-scroll {
      width: max-content !important;
      max-height: none !important;
      overflow: visible !important;
    }

    .draft-print-area button {
      -webkit-appearance: none !important;
      appearance: none !important;
      box-shadow: none !important;
    }

    .toolbar-row,
    .ghost-cell,
    .draft-stage-actions {
      display: none !important;
    }

    .draft-print-area td {
      background: #ffffff !important;
    }
  }
</style>
</head>

<body>
<a href="index.html" class="draft-stage-button page-home-link" aria-label="Back to home" title="Back to home">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M3 10.5 12 3l9 7.5"></path>
    <path d="M5.5 9.5V21h13V9.5"></path>
    <path d="M9.5 21v-6h5v6"></path>
  </svg>
</a>
<main class="container py-4 py-lg-5">


      <div class="controls-card p-3 p-lg-4 mb-4">
        <div class="control-actions-panel">
          <div class="control-actions">
            <button type="button" class="btn btn-soft" onclick="saveDraftToFile()">Save Draft</button>
            <button type="button" class="btn btn-soft" onclick="openDraftFilePicker()">Open Draft</button>
            <button type="button" class="btn btn-drafter" onclick="confirmReset()">Clear</button>
          </div>
          <input id="draft-file-input" type="file" accept=".wdd,application/json" class="d-none">
        </div>

        <div class="row g-2 controls-toolbar align-items-end">
          <div class="col-6 col-md-2">
            <label class="control-label" for="shafts">Shafts</label>
            <input id="shafts" class="form-control" type="number" value="4" min="1" step="1" inputmode="numeric">
          </div>

          <div class="col-6 col-md-2">
            <label class="control-label" for="treadles">Treadles</label>
            <input id="treadles" class="form-control" type="number" value="4" min="1" step="1" inputmode="numeric">
          </div>

          <div class="col-6 col-md-2">
            <label class="control-label" for="warp">Warp Threads</label>
            <input id="warp" class="form-control" type="number" value="16" min="1" step="1" inputmode="numeric">
          </div>

          <div class="col-6 col-md-2">
            <label class="control-label" for="picks">Picks</label>
            <input id="picks" class="form-control" type="number" value="16" min="1" step="1" inputmode="numeric">
          </div>
        </div>

        <div class="pattern-colors-panel">
          <div class="pattern-colors-header">
            <div class="pattern-colors-title">
              <span class="control-label mb-1">Pattern Colors</span>
              <p class="pattern-colors-copy text-secondary mb-0">Select one, then click threading or treadling.</p>
            </div>

            <div class="pattern-colors-tools">
              <div id="pattern-colors" class="pattern-colors-row"></div>
              <button type="button" class="btn btn-soft pattern-color-add" onclick="addPatternColor()">Add Color</button>
            </div>
          </div>
        </div>
      </div>

      <div class="draft-stage">
        <div class="draft-stage-header">
          <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-2">
            <div>
              <h2 class="fw-semibold">Draft</h2>
            </div>
            <div class="draft-stage-actions">
              <div class="draft-stage-zoom" aria-label="Draft zoom controls">
                <button
                  type="button"
                  id="draft-zoom-out"
                  class="draft-stage-button draft-stage-zoom-button"
                  onclick="changeDraftZoom(-1)"
                  aria-label="Zoom out"
                  title="Zoom out"
                >−</button>
                <button
                  type="button"
                  id="draft-zoom-in"
                  class="draft-stage-button draft-stage-zoom-button"
                  onclick="changeDraftZoom(1)"
                  aria-label="Zoom in"
                  title="Zoom in"
                >+</button>
              </div>
              <button type="button" class="draft-stage-button" onclick="printDraftGrid()" aria-label="Print grid" title="Print grid">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M7 9V4h10v5"></path>
                  <path d="M6 17H4a1 1 0 0 1-1-1v-5a3 3 0 0 1 3-3h12a3 3 0 0 1 3 3v5a1 1 0 0 1-1 1h-2"></path>
                  <path d="M6 14h12v6H6z"></path>
                  <path d="M17 12.5h.01"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div class="draft-grid-scroll">
          <div class="draft-print-area">
            <table class="draft">
              <tr class="toolbar-row">
                <th>
                  <div id="warp-inserts" class="warp-toolbar"></div>
                </th>
                <th></th>
                <th class="ghost-cell"></th>
              </tr>

              <tr>
                <td><div id="threading" class="grid"></div></td>
                <td><div id="tieup" class="grid"></div></td>
                <td class="ghost-cell"></td>
              </tr>

              <tr>
                <td><div id="drawdown" class="grid"></div></td>
                <td>
                  <div class="pick-wrap">
                    <div id="treadling" class="grid"></div>
                  </div>
                </td>
                <td class="ghost-cell">
                  <div id="pick-inserts" class="pick-toolbar"></div>
                </td>
              </tr>
            </table>
          </div>
        </div>
      </div>

      <div class="preview-stage">
        <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-2">
          <div>
            <h2 class="fw-semibold">Repeated Fabric Preview</h2>
            <p class="small text-secondary">A rendering of the current drawdown, repeated into a larger swatch with smaller cells.</p>
          </div>
          <div class="preview-controls">
            <div>
              <label class="control-label preview-control-label" for="preview-repeat-x">Repeat X</label>
              <input id="preview-repeat-x" class="form-control preview-control" type="number" value="4" min="1" step="1" inputmode="numeric">
            </div>
            <div>
              <label class="control-label preview-control-label" for="preview-repeat-y">Repeat Y</label>
              <input id="preview-repeat-y" class="form-control preview-control" type="number" value="4" min="1" step="1" inputmode="numeric">
            </div>
            <div class="preview-mode-group">
              <label class="control-label preview-control-label">Render</label>
              <div class="preview-mode-toggle" role="group" aria-label="Fabric render mode">
                <button type="button" id="preview-render-plain" class="preview-mode-button active" onclick="setPreviewRenderMode('plain')">Plain</button>
                <button type="button" id="preview-render-realistic" class="preview-mode-button" onclick="setPreviewRenderMode('realistic')">Realistic</button>
                <button type="button" id="preview-render-ultra" class="preview-mode-button" onclick="setPreviewRenderMode('ultra')" title="Ultra-realistic">Ultra</button>
              </div>
            </div>
            <div id="preview-sett-group">
              <label class="control-label preview-control-label" for="preview-sett">Sett</label>
              <input
                id="preview-sett"
                class="form-range preview-sett-control"
                type="range"
                min="0"
                max="100"
                step="1"
                value="60"
                aria-label="Preview sett"
              >
            </div>
            <div id="preview-background-group">
              <label class="control-label preview-control-label" for="preview-background-color">Background</label>
              <input
                id="preview-background-color"
                class="form-control form-control-color preview-color-control"
                type="color"
                value="#ffffff"
                aria-label="Preview background color"
              >
            </div>
          </div>
        </div>

        <div id="repeat-preview-scroll" class="preview-scroll">
          <div class="preview-canvas-wrap">
            <canvas id="repeat-preview-canvas" class="repeat-canvas"></canvas>
          </div>
        </div>
      </div>


</main>

<script>
let shafts = 4, treadles = 4, warp = 16, picks = 16;
let threading = [];
let treadling = [];
let tieup = [];
let patternColors = [
  { id: "pattern-color-1", value: "#2f241d" },
  { id: "pattern-color-2", value: "#d4d4d4" },
  { id: "pattern-color-3", value: "#c84d36" },
  { id: "pattern-color-4", value: "#3f9159" },
  { id: "pattern-color-5", value: "#2f6fa8" }
];
let activePatternColorId = "pattern-color-1";
let nextPatternColorNumber = 6;
let previewRenderMode = "plain";
let previewSett = 60;
let draftCellSize = 20;
const defaultPreviewBackgroundColor = "#ffffff";
const defaultPreviewSett = 60;
const defaultDraftCellSize = 20;
const minDraftCellSize = 6;
const maxDraftCellSize = 36;
const draftZoomStep = 2;
const controlIds = ["shafts", "treadles", "warp", "picks"];
const previewControlIds = ["preview-repeat-x", "preview-repeat-y"];
const patternColorSeedValues = ["#d2a03a", "#7a5fd0", "#d6718c", "#4f8d88", "#bc6c25", "#5e548e"];
const defaultPatternColors = [
  { id: "pattern-color-1", value: "#2f241d" },
  { id: "pattern-color-2", value: "#d4d4d4" },
  { id: "pattern-color-3", value: "#c84d36" },
  { id: "pattern-color-4", value: "#3f9159" },
  { id: "pattern-color-5", value: "#2f6fa8" }
];

function createDefaultPatternColors() {
  return defaultPatternColors.map(color => ({...color}));
}

function getSelectedPatternColorId() {
  if (!patternColors.some(color => color.id === activePatternColorId)) {
    activePatternColorId = patternColors[0]?.id || null;
  }
  return activePatternColorId;
}

function getNextPatternColorNumberFromPalette(colors) {
  const usedNumbers = colors
    .map(color => Number.parseInt(String(color.id).replace("pattern-color-", ""), 10))
    .filter(Number.isFinite);
  return (usedNumbers.length ? Math.max(...usedNumbers) : 0) + 1;
}

function setControlValues(nextValues) {
  document.getElementById("shafts").value = nextValues.shafts;
  document.getElementById("treadles").value = nextValues.treadles;
  document.getElementById("warp").value = nextValues.warp;
  document.getElementById("picks").value = nextValues.picks;
}

function setPreviewRepeatValues(nextValues) {
  document.getElementById("preview-repeat-x").value = nextValues.repeatX;
  document.getElementById("preview-repeat-y").value = nextValues.repeatY;
}

function normalizePreviewBackgroundColor(value) {
  return /^#[0-9a-f]{6}$/i.test(value || "") ? value.toLowerCase() : defaultPreviewBackgroundColor;
}

function getPreviewBackgroundColor() {
  return normalizePreviewBackgroundColor(document.getElementById("preview-background-color").value);
}

function setPreviewBackgroundColor(value) {
  document.getElementById("preview-background-color").value = normalizePreviewBackgroundColor(value);
}

function normalizePreviewSett(value) {
  return Math.max(0, Math.min(100, Number.parseInt(value, 10) || 0));
}

function getPreviewSettValue() {
  return normalizePreviewSett(previewSett);
}

function setPreviewSettValue(value) {
  previewSett = normalizePreviewSett(value);
  document.getElementById("preview-sett").value = String(previewSett);
}

function clampDraftCellSize(value) {
  return Math.max(minDraftCellSize, Math.min(maxDraftCellSize, value));
}

function updateDraftZoomUI() {
  document.getElementById("draft-zoom-out").disabled = draftCellSize <= minDraftCellSize;
  document.getElementById("draft-zoom-in").disabled = draftCellSize >= maxDraftCellSize;
}

function applyDraftZoom() {
  draftCellSize = clampDraftCellSize(draftCellSize);
  document.documentElement.style.setProperty("--cell-size", `${draftCellSize}px`);
  updateDraftZoomUI();
}

function changeDraftZoom(direction) {
  const nextCellSize = clampDraftCellSize(draftCellSize + direction * draftZoomStep);

  if (nextCellSize === draftCellSize) {
    updateDraftZoomUI();
    return;
  }

  draftCellSize = nextCellSize;
  applyDraftZoom();
}

function getEffectivePreviewBackgroundColor(mode = getPreviewRenderMode()) {
  return mode === "plain" ? defaultPreviewBackgroundColor : getPreviewBackgroundColor();
}

function updatePreviewBackgroundUI(backgroundColor = getEffectivePreviewBackgroundColor()) {
  document.getElementById("repeat-preview-scroll").style.backgroundColor = backgroundColor;
  document.querySelector(".preview-canvas-wrap").style.backgroundColor = backgroundColor;
  document.getElementById("repeat-preview-canvas").style.backgroundColor = backgroundColor;
}

function normalizePreviewRenderMode(mode) {
  return ["plain", "realistic", "ultra"].includes(mode) ? mode : "plain";
}

function getPreviewRenderMode() {
  return normalizePreviewRenderMode(previewRenderMode);
}

function updatePreviewRenderModeUI() {
  const activeMode = getPreviewRenderMode();
  const showAdvancedPreviewControls = activeMode !== "plain";
  document.getElementById("preview-render-plain").classList.toggle("active", activeMode === "plain");
  document.getElementById("preview-render-realistic").classList.toggle("active", activeMode === "realistic");
  document.getElementById("preview-render-ultra").classList.toggle("active", activeMode === "ultra");
  document.getElementById("preview-sett-group").hidden = !showAdvancedPreviewControls;
  document.getElementById("preview-background-group").hidden = !showAdvancedPreviewControls;
}

function setPreviewRenderMode(mode, shouldRender = true) {
  previewRenderMode = normalizePreviewRenderMode(mode);
  updatePreviewRenderModeUI();
  updatePreviewBackgroundUI(getEffectivePreviewBackgroundColor());
  if (shouldRender) {
    renderRepeatPreview();
  }
}

function normalizePatternColors(colors) {
  const normalized = Array.isArray(colors)
    ? colors
        .map((color, index) => ({
          id: typeof color?.id === "string" && color.id ? color.id : `pattern-color-${index + 1}`,
          value: /^#[0-9a-f]{6}$/i.test(color?.value || "") ? color.value : null
        }))
        .filter(color => color.value)
    : [];

  return normalized.length ? normalized : createDefaultPatternColors();
}

function normalizeThreadingData(data, nextShafts, nextWarp, colors) {
  const validColorIds = new Set(colors.map(color => color.id));
  return Array.from({length: nextShafts}, (_, shaftIndex) =>
    Array.from({length: nextWarp}, (_, warpIndex) => {
      const value = data?.[shaftIndex]?.[warpIndex];
      return validColorIds.has(value) ? value : 0;
    })
  );
}

function normalizeTreadlingData(data, nextPicks, nextTreadles, colors) {
  const validColorIds = new Set(colors.map(color => color.id));
  return Array.from({length: nextPicks}, (_, pickIndex) =>
    Array.from({length: nextTreadles}, (_, treadleIndex) => {
      const value = data?.[pickIndex]?.[treadleIndex];
      return validColorIds.has(value) ? value : 0;
    })
  );
}

function normalizeTieupData(data, nextTreadles, nextShafts) {
  return Array.from({length: nextTreadles}, (_, treadleIndex) =>
    Array.from({length: nextShafts}, (_, shaftIndex) => (data?.[treadleIndex]?.[shaftIndex] ? 1 : 0))
  );
}

function buildDraftSaveData() {
  return {
    format: "weaving-draft-data",
    version: 1,
    draft: {
      shafts,
      treadles,
      warp,
      picks,
      threading,
      treadling,
      tieup,
      patternColors,
      activePatternColorId,
      nextPatternColorNumber
    },
    preview: {
      ...getPreviewRepeatValues(),
      renderMode: getPreviewRenderMode(),
      sett: getPreviewSettValue(),
      backgroundColor: getPreviewBackgroundColor()
    }
  };
}

function saveDraftToFile() {
  const data = buildDraftSaveData();
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  const timestamp = new Date().toISOString().slice(0, 10);

  link.href = url;
  link.download = `weaving-draft-${timestamp}.wdd`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

function openDraftFilePicker() {
  document.getElementById("draft-file-input").click();
}

function applyLoadedDraftData(data) {
  if (data?.format !== "weaving-draft-data" || typeof data?.draft !== "object") {
    throw new Error("That file is not a valid WDD draft.");
  }

  const nextShafts = Math.max(1, Number.parseInt(data.draft.shafts, 10) || 1);
  const nextTreadles = Math.max(1, Number.parseInt(data.draft.treadles, 10) || 1);
  const nextWarp = Math.max(1, Number.parseInt(data.draft.warp, 10) || 1);
  const nextPicks = Math.max(1, Number.parseInt(data.draft.picks, 10) || 1);
  const nextPatternColors = normalizePatternColors(data.draft.patternColors);
  const nextActivePatternColorId = nextPatternColors.some(color => color.id === data.draft.activePatternColorId)
    ? data.draft.activePatternColorId
    : nextPatternColors[0].id;
  const nextPreview = {
    repeatX: Math.max(1, Number.parseInt(data.preview?.repeatX, 10) || 1),
    repeatY: Math.max(1, Number.parseInt(data.preview?.repeatY, 10) || 1),
    renderMode: normalizePreviewRenderMode(data.preview?.renderMode),
    sett: normalizePreviewSett(data.preview?.sett ?? defaultPreviewSett),
    backgroundColor: normalizePreviewBackgroundColor(data.preview?.backgroundColor)
  };

  shafts = nextShafts;
  treadles = nextTreadles;
  warp = nextWarp;
  picks = nextPicks;
  patternColors = nextPatternColors;
  activePatternColorId = nextActivePatternColorId;
  nextPatternColorNumber = Math.max(
    getNextPatternColorNumberFromPalette(nextPatternColors),
    Math.max(1, Number.parseInt(data.draft.nextPatternColorNumber, 10) || 1)
  );
  threading = normalizeThreadingData(data.draft.threading, shafts, warp, patternColors);
  treadling = normalizeTreadlingData(data.draft.treadling, picks, treadles, patternColors);
  tieup = normalizeTieupData(data.draft.tieup, treadles, shafts);

  setControlValues({shafts, treadles, warp, picks});
  setPreviewRepeatValues(nextPreview);
  setPreviewSettValue(nextPreview.sett);
  setPreviewBackgroundColor(nextPreview.backgroundColor);
  setPreviewRenderMode(nextPreview.renderMode, false);
  renderPatternColors();
  renderAll();
}

function handleDraftFileChange(event) {
  const file = event.target.files?.[0];

  if (!file) {
    return;
  }

  const reader = new FileReader();
  reader.onload = loadEvent => {
    try {
      const parsed = JSON.parse(String(loadEvent.target?.result || ""));
      applyLoadedDraftData(parsed);
    } catch (error) {
      window.alert(error?.message || "Unable to open that draft file.");
    } finally {
      event.target.value = "";
    }
  };
  reader.onerror = () => {
    window.alert("Unable to read that draft file.");
    event.target.value = "";
  };
  reader.readAsText(file);
}

function getPatternColorValue(colorId) {
  return patternColors.find(color => color.id === colorId)?.value || null;
}

const previewColorCache = new Map();

function clampPreviewChannel(value) {
  return Math.max(0, Math.min(255, Math.round(value)));
}

function normalizePreviewColor(colorValue) {
  if (typeof colorValue !== "string") {
    return "#ffffff";
  }

  const trimmed = colorValue.trim();

  if (/^#[0-9a-f]{3}$/i.test(trimmed)) {
    return `#${trimmed[1]}${trimmed[1]}${trimmed[2]}${trimmed[2]}${trimmed[3]}${trimmed[3]}`.toLowerCase();
  }

  if (/^#[0-9a-f]{6}$/i.test(trimmed)) {
    return trimmed.toLowerCase();
  }

  return "#ffffff";
}

function getPreviewColorRgb(colorValue) {
  if (typeof colorValue === "string") {
    const rgbMatch = colorValue.trim().match(
      /^rgba?\(\s*([0-9]+(?:\.[0-9]+)?)\s*,\s*([0-9]+(?:\.[0-9]+)?)\s*,\s*([0-9]+(?:\.[0-9]+)?)/i
    );

    if (rgbMatch) {
      return {
        r: clampPreviewChannel(Number.parseFloat(rgbMatch[1])),
        g: clampPreviewChannel(Number.parseFloat(rgbMatch[2])),
        b: clampPreviewChannel(Number.parseFloat(rgbMatch[3]))
      };
    }
  }

  const normalized = normalizePreviewColor(colorValue);

  if (previewColorCache.has(normalized)) {
    return previewColorCache.get(normalized);
  }

  const rgb = {
    r: Number.parseInt(normalized.slice(1, 3), 16),
    g: Number.parseInt(normalized.slice(3, 5), 16),
    b: Number.parseInt(normalized.slice(5, 7), 16)
  };

  previewColorCache.set(normalized, rgb);
  return rgb;
}

function mixPreviewColors(colorA, colorB, amount = 0.5) {
  const ratio = Math.max(0, Math.min(1, amount));
  const start = getPreviewColorRgb(colorA);
  const end = getPreviewColorRgb(colorB);

  return `rgb(${clampPreviewChannel(start.r + (end.r - start.r) * ratio)}, ${clampPreviewChannel(
    start.g + (end.g - start.g) * ratio
  )}, ${clampPreviewChannel(start.b + (end.b - start.b) * ratio)})`;
}

function lightenPreviewColor(colorValue, amount) {
  return mixPreviewColors(colorValue, "#ffffff", amount);
}

function darkenPreviewColor(colorValue, amount) {
  return mixPreviewColors(colorValue, "#000000", amount);
}

function previewAlphaColor(colorValue, alpha) {
  const { r, g, b } = getPreviewColorRgb(colorValue);
  return `rgba(${r}, ${g}, ${b}, ${Math.max(0, Math.min(1, alpha))})`;
}

function drawPreviewThreadBand(ctx, x, y, cellSize, spanLength, colorValue, orientation, isTopLayer, thicknessOverride = null) {
  const thickness =
    thicknessOverride === null
      ? cellSize * (isTopLayer ? 0.8 : 0.66)
      : thicknessOverride;
  const inset = (cellSize - thickness) / 2;
  const rect =
    orientation === "vertical"
      ? { x: x + inset, y, width: thickness, height: spanLength }
      : { x, y: y + inset, width: spanLength, height: thickness };
  const gradient =
    orientation === "vertical"
      ? ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.width, rect.y)
      : ctx.createLinearGradient(rect.x, rect.y, rect.x, rect.y + rect.height);
  const edgeShadow =
    orientation === "vertical"
      ? ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.width, rect.y)
      : ctx.createLinearGradient(rect.x, rect.y, rect.x, rect.y + rect.height);
  const highlight =
    orientation === "vertical"
      ? ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.width, rect.y)
      : ctx.createLinearGradient(rect.x, rect.y, rect.x, rect.y + rect.height);
  const outerDarkness = 0.34;
  const shoulderDarkness = 0.16;
  const centerHighlight = 0.24;
  const innerDarkness = 0.14;
  const edgeShadowAlpha = 0.12;
  const highlightAlpha = 0.24;

  gradient.addColorStop(0, darkenPreviewColor(colorValue, outerDarkness));
  gradient.addColorStop(0.18, darkenPreviewColor(colorValue, shoulderDarkness));
  gradient.addColorStop(0.5, lightenPreviewColor(colorValue, centerHighlight));
  gradient.addColorStop(0.82, darkenPreviewColor(colorValue, innerDarkness));
  gradient.addColorStop(1, darkenPreviewColor(colorValue, outerDarkness));

  edgeShadow.addColorStop(0, previewAlphaColor("#000000", edgeShadowAlpha));
  edgeShadow.addColorStop(0.18, previewAlphaColor("#000000", 0));
  edgeShadow.addColorStop(0.82, previewAlphaColor("#000000", 0));
  edgeShadow.addColorStop(1, previewAlphaColor("#000000", edgeShadowAlpha));

  highlight.addColorStop(0, previewAlphaColor("#ffffff", 0));
  highlight.addColorStop(0.5, previewAlphaColor("#ffffff", highlightAlpha));
  highlight.addColorStop(1, previewAlphaColor("#ffffff", 0));

  ctx.fillStyle = gradient;
  ctx.fillRect(rect.x, rect.y, rect.width, rect.height);

  ctx.fillStyle = edgeShadow;
  ctx.fillRect(rect.x, rect.y, rect.width, rect.height);

  ctx.fillStyle = highlight;
  ctx.fillRect(rect.x, rect.y, rect.width, rect.height);
}

function previewNoise(...values) {
  let seed = 0;

  values.forEach((value, index) => {
    seed += (Number(value) + 1) * (index + 1) * 12.9898;
  });

  const raw = Math.sin(seed) * 43758.5453123;
  return raw - Math.floor(raw);
}

function drawPreviewThreadLayer(ctx, x, y, cellSize, colorValue, orientation, isTopLayer) {
  drawPreviewThreadBand(ctx, x, y, cellSize, cellSize, colorValue, orientation, isTopLayer);
}

function drawUltraPreviewThreadBand(
  ctx,
  x,
  y,
  cellSize,
  spanLength,
  colorValue,
  orientation,
  isTopLayer,
  yarnTrackIndex,
  tileLength,
  thicknessOverride = null
) {
  const thickness =
    thicknessOverride === null
      ? cellSize * (isTopLayer ? 0.78 : 0.62)
      : thicknessOverride;
  const inset = (cellSize - thickness) / 2;
  const rect =
    orientation === "vertical"
      ? { x: x + inset, y, width: thickness, height: spanLength }
      : { x, y: y + inset, width: spanLength, height: thickness };
  const crossGradient =
    orientation === "vertical"
      ? ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.width, rect.y)
      : ctx.createLinearGradient(rect.x, rect.y, rect.x, rect.y + rect.height);
  const matteShadow =
    orientation === "vertical"
      ? ctx.createLinearGradient(rect.x, rect.y, rect.x + rect.width, rect.y)
      : ctx.createLinearGradient(rect.x, rect.y, rect.x, rect.y + rect.height);
  const baseSeed = previewNoise(yarnTrackIndex, orientation === "vertical" ? 13 : 29, 7);
  const softHighlightStrength = 0.1;

  crossGradient.addColorStop(0, darkenPreviewColor(colorValue, 0.26));
  crossGradient.addColorStop(0.24, darkenPreviewColor(colorValue, 0.09));
  crossGradient.addColorStop(0.5, lightenPreviewColor(colorValue, softHighlightStrength + baseSeed * 0.04));
  crossGradient.addColorStop(0.76, darkenPreviewColor(colorValue, 0.08));
  crossGradient.addColorStop(1, darkenPreviewColor(colorValue, 0.24));

  matteShadow.addColorStop(0, previewAlphaColor("#000000", 0.07));
  matteShadow.addColorStop(0.2, previewAlphaColor("#000000", 0));
  matteShadow.addColorStop(0.8, previewAlphaColor("#000000", 0));
  matteShadow.addColorStop(1, previewAlphaColor("#000000", 0.07));

  ctx.fillStyle = crossGradient;
  ctx.fillRect(rect.x, rect.y, rect.width, rect.height);

  ctx.fillStyle = matteShadow;
  ctx.fillRect(rect.x, rect.y, rect.width, rect.height);

  ctx.save();
  ctx.beginPath();
  ctx.rect(rect.x, rect.y, rect.width, rect.height);
  ctx.clip();
  ctx.lineCap = "round";

  const fiberCount = Math.max(5, Math.min(14, Math.round(cellSize * 0.78)));
  const twistDirection = previewNoise(yarnTrackIndex, 79) < 0.5 ? -1 : 1;
  const baseTwistCycles = 2 + Math.floor(previewNoise(yarnTrackIndex, 89) * 4);

  for (let fiberIndex = 0; fiberIndex < fiberCount; fiberIndex++) {
    const jitter = previewNoise(yarnTrackIndex, fiberIndex, orientation === "vertical" ? 31 : 37, 41);
    const wavePhase = previewNoise(yarnTrackIndex, fiberIndex, 53) * Math.PI * 2;
    const twistCycles = baseTwistCycles + (fiberIndex % 2);
    const strandShade =
      fiberIndex % 2 === 0
        ? previewAlphaColor(lightenPreviewColor(colorValue, 0.22 + jitter * 0.1), 0.16)
        : previewAlphaColor(darkenPreviewColor(colorValue, 0.18 + jitter * 0.1), 0.14);

    ctx.strokeStyle = strandShade;
    ctx.lineWidth = Math.max(0.45, cellSize * (0.022 + jitter * 0.015));
    ctx.beginPath();

    if (orientation === "vertical") {
      const strandBaseX = rect.x + rect.width * (0.14 + jitter * 0.72);
      const maxAmplitude = Math.min(strandBaseX - rect.x, rect.x + rect.width - strandBaseX) * 0.92;
      const twistAmplitude = Math.max(
        cellSize * 0.03,
        Math.min(maxAmplitude, rect.width * (0.18 + previewNoise(yarnTrackIndex, fiberIndex, 61) * 0.2))
      );
      const startY = rect.y - cellSize * 0.03;
      const endY = rect.y + rect.height + cellSize * 0.03;
      const sampleCount = Math.max(4, Math.ceil(rect.height / Math.max(1, cellSize)));
      ctx.moveTo(
        strandBaseX +
          twistAmplitude *
            Math.sin((startY / tileLength) * Math.PI * 2 * twistCycles * twistDirection + wavePhase),
        startY
      );
      for (let sampleIndex = 1; sampleIndex <= sampleCount; sampleIndex++) {
        const sampleY = startY + ((endY - startY) * sampleIndex) / sampleCount;
        const sampleX =
          strandBaseX +
          twistAmplitude *
            Math.sin((sampleY / tileLength) * Math.PI * 2 * twistCycles * twistDirection + wavePhase);
        ctx.lineTo(sampleX, sampleY);
      }
    } else {
      const strandBaseY = rect.y + rect.height * (0.14 + jitter * 0.72);
      const maxAmplitude = Math.min(strandBaseY - rect.y, rect.y + rect.height - strandBaseY) * 0.92;
      const twistAmplitude = Math.max(
        cellSize * 0.03,
        Math.min(maxAmplitude, rect.height * (0.18 + previewNoise(yarnTrackIndex, fiberIndex, 61) * 0.2))
      );
      const startX = rect.x - cellSize * 0.03;
      const endX = rect.x + rect.width + cellSize * 0.03;
      const sampleCount = Math.max(4, Math.ceil(rect.width / Math.max(1, cellSize)));
      ctx.moveTo(
        startX,
        strandBaseY +
          twistAmplitude *
            Math.sin((startX / tileLength) * Math.PI * 2 * twistCycles * twistDirection + wavePhase)
      );
      for (let sampleIndex = 1; sampleIndex <= sampleCount; sampleIndex++) {
        const sampleX = startX + ((endX - startX) * sampleIndex) / sampleCount;
        const sampleY =
          strandBaseY +
          twistAmplitude *
            Math.sin((sampleX / tileLength) * Math.PI * 2 * twistCycles * twistDirection + wavePhase);
        ctx.lineTo(sampleX, sampleY);
      }
    }

    ctx.stroke();
  }

  ctx.restore();

  if (isTopLayer && cellSize >= 7) {
    const fuzzCount = Math.max(3, Math.min(7, Math.round(cellSize / 3.4)));

    ctx.lineCap = "round";

    for (let fuzzIndex = 0; fuzzIndex < fuzzCount; fuzzIndex++) {
      const fuzzSeed = previewNoise(yarnTrackIndex, fuzzIndex, orientation === "vertical" ? 71 : 89);
      const fuzzLift = cellSize * (0.08 + previewNoise(yarnTrackIndex, fuzzIndex, 97) * 0.12);
      const drift = (previewNoise(yarnTrackIndex, fuzzIndex, 131) - 0.5) * cellSize * 0.16;
      const direction = previewNoise(yarnTrackIndex, fuzzIndex, 149) < 0.5 ? -1 : 1;

      ctx.strokeStyle = previewAlphaColor(lightenPreviewColor(colorValue, 0.32), 0.24);
      ctx.lineWidth = Math.max(0.45, cellSize * 0.02);
      ctx.beginPath();

      if (orientation === "vertical") {
        const edge = previewNoise(yarnTrackIndex, fuzzIndex, 157) < 0.5 ? rect.x : rect.x + rect.width;
        const startX = edge + direction * cellSize * 0.02;
        const startY = rect.y + rect.height * (0.08 + fuzzSeed * 0.84);
        ctx.moveTo(startX, startY);
        ctx.quadraticCurveTo(
          startX + direction * fuzzLift * 0.7,
          startY + drift,
          startX + direction * fuzzLift,
          startY + drift * 0.4 + cellSize * (previewNoise(yarnTrackIndex, fuzzIndex, 163) - 0.5) * 0.18
        );
      } else {
        const edge = previewNoise(yarnTrackIndex, fuzzIndex, 167) < 0.5 ? rect.y : rect.y + rect.height;
        const startX = rect.x + rect.width * (0.08 + fuzzSeed * 0.84);
        const startY = edge + direction * cellSize * 0.02;
        ctx.moveTo(startX, startY);
        ctx.quadraticCurveTo(
          startX + drift,
          startY + direction * fuzzLift * 0.7,
          startX + drift * 0.4 + cellSize * (previewNoise(yarnTrackIndex, fuzzIndex, 173) - 0.5) * 0.18,
          startY + direction * fuzzLift
        );
      }

      ctx.stroke();
    }
  }
}

function drawUltraPreviewThreadLayer(ctx, x, y, cellSize, colorValue, orientation, isTopLayer, cellX, cellY) {
  const yarnTrackIndex = orientation === "vertical" ? cellX : cellY;
  const tileLength = Math.max(1, (orientation === "vertical" ? picks : warp) * cellSize);
  drawUltraPreviewThreadBand(
    ctx,
    x,
    y,
    cellSize,
    cellSize,
    colorValue,
    orientation,
    isTopLayer,
    yarnTrackIndex,
    tileLength
  );
}

function drawPreviewIntersectionShadow(ctx, x, y, cellSize, topOrientation) {
  const topThickness = cellSize * 0.8;
  const inset = (cellSize - topThickness) / 2;
  const spread = cellSize * 0.12;
  const shadow =
    topOrientation === "vertical"
      ? ctx.createLinearGradient(x + inset - spread, y, x + inset + topThickness + spread, y)
      : ctx.createLinearGradient(x, y + inset - spread, x, y + inset + topThickness + spread);

  shadow.addColorStop(0, previewAlphaColor("#000000", 0));
  shadow.addColorStop(0.2, previewAlphaColor("#000000", 0.06));
  shadow.addColorStop(0.5, previewAlphaColor("#000000", 0.15));
  shadow.addColorStop(0.8, previewAlphaColor("#000000", 0.06));
  shadow.addColorStop(1, previewAlphaColor("#000000", 0));

  ctx.fillStyle = shadow;
  ctx.fillRect(x, y, cellSize, cellSize);
}

function drawUltraPreviewIntersectionShadow(ctx, x, y, cellSize, topOrientation) {
  const topThickness = cellSize * 0.78;
  const inset = (cellSize - topThickness) / 2;
  const spread = cellSize * 0.18;
  const shadow =
    topOrientation === "vertical"
      ? ctx.createLinearGradient(x + inset - spread, y, x + inset + topThickness + spread, y)
      : ctx.createLinearGradient(x, y + inset - spread, x, y + inset + topThickness + spread);

  shadow.addColorStop(0, previewAlphaColor("#000000", 0));
  shadow.addColorStop(0.24, previewAlphaColor("#000000", 0.035));
  shadow.addColorStop(0.5, previewAlphaColor("#000000", 0.08));
  shadow.addColorStop(0.76, previewAlphaColor("#000000", 0.035));
  shadow.addColorStop(1, previewAlphaColor("#000000", 0));

  ctx.fillStyle = shadow;
  ctx.fillRect(x, y, cellSize, cellSize);
}

function drawPreviewWovenCell(ctx, x, y, cellSize, cellState, backgroundColor = defaultPreviewBackgroundColor) {
  const topColor = cellState.frontColor || "#ffffff";
  const underColor = cellState.backColor || topColor;
  const topOrientation = cellState.warpVisibleOnFront ? "vertical" : "horizontal";
  const underOrientation = topOrientation === "vertical" ? "horizontal" : "vertical";

  if (cellSize < 3.5) {
    ctx.fillStyle = topColor;
    ctx.fillRect(x, y, cellSize, cellSize);
    return;
  }

  ctx.fillStyle = backgroundColor;
  ctx.fillRect(x, y, cellSize, cellSize);

  drawPreviewThreadLayer(ctx, x, y, cellSize, underColor, underOrientation, false);

  if (cellSize >= 6) {
    drawPreviewIntersectionShadow(ctx, x, y, cellSize, topOrientation);
  }

  drawPreviewThreadLayer(ctx, x, y, cellSize, topColor, topOrientation, true);
}

function drawPreviewUltraWovenCell(
  ctx,
  x,
  y,
  cellSize,
  cellState,
  cellX,
  cellY,
  backgroundColor = defaultPreviewBackgroundColor
) {
  const topColor = cellState.frontColor || "#ffffff";
  const underColor = cellState.backColor || topColor;
  const topOrientation = cellState.warpVisibleOnFront ? "vertical" : "horizontal";
  const underOrientation = topOrientation === "vertical" ? "horizontal" : "vertical";

  if (cellSize < 5.5) {
    drawPreviewWovenCell(ctx, x, y, cellSize, cellState, backgroundColor);
    return;
  }

  ctx.fillStyle = backgroundColor;
  ctx.fillRect(x, y, cellSize, cellSize);

  drawUltraPreviewThreadLayer(ctx, x, y, cellSize, underColor, underOrientation, false, cellX, cellY);

  if (cellSize >= 7) {
    drawUltraPreviewIntersectionShadow(ctx, x, y, cellSize, topOrientation);
  }

  drawUltraPreviewThreadLayer(ctx, x, y, cellSize, topColor, topOrientation, true, cellX, cellY);
}

function drawPreviewPlainCell(ctx, x, y, cellSize, cellState) {
  ctx.fillStyle = cellState.frontColor || "#ffffff";
  ctx.fillRect(x, y, cellSize, cellSize);
}

function getPreviewLayerWidths(cellSize, renderMode) {
  const settRatio = getPreviewSettValue() / 100;
  const topMin = renderMode === "ultra" ? 0.45 : 0.5;
  const underMin = renderMode === "ultra" ? 0.28 : 0.34;
  const topWidth = topMin + (1 - topMin) * settRatio;
  const underWidth = underMin + (1 - underMin) * settRatio;

  return {
    top: cellSize * topWidth,
    under: cellSize * underWidth
  };
}

function isPreviewOrientationOnTop(cellState, orientation) {
  return orientation === "vertical" ? cellState.warpVisibleOnFront : !cellState.warpVisibleOnFront;
}

function getPreviewNeighborState(states, cellX, cellY, orientation, direction) {
  const rowCount = states.length;
  const columnCount = states[0]?.length || 0;

  if (!rowCount || !columnCount) {
    return null;
  }

  if (orientation === "vertical") {
    const wrappedY = (cellY + direction + rowCount) % rowCount;
    return states[wrappedY]?.[cellX] || null;
  }

  const wrappedX = (cellX + direction + columnCount) % columnCount;
  return states[cellY]?.[wrappedX] || null;
}

function getPreviewBorderThickness(states, cellX, cellY, orientation, isTopLayer, renderMode, cellSize, direction) {
  const widths = getPreviewLayerWidths(cellSize, renderMode);
  const currentThickness = isTopLayer ? widths.top : widths.under;
  const neighborState = getPreviewNeighborState(states, cellX, cellY, orientation, direction);

  if (!neighborState) {
    return currentThickness;
  }

  const neighborIsTopLayer = isPreviewOrientationOnTop(neighborState, orientation);

  return neighborIsTopLayer === isTopLayer ? currentThickness : (widths.top + widths.under) / 2;
}

function buildPreviewThreadPath(x, y, cellSize, orientation, startThickness, middleThickness, endThickness) {
  const sampleCount = 8;
  const path = new Path2D();
  const thicknessAt = position => {
    if (position <= 0.5) {
      const local = position / 0.5;
      const exponent = startThickness > middleThickness ? 2.2 : 0.85;
      const eased = Math.pow(local, exponent);
      return startThickness + (middleThickness - startThickness) * eased;
    }

    const local = (position - 0.5) / 0.5;
    const exponent = endThickness > middleThickness ? 2.2 : 0.85;
    const eased = Math.pow(local, exponent);
    return middleThickness + (endThickness - middleThickness) * eased;
  };

  if (orientation === "vertical") {
    const topHalf = thicknessAt(0) / 2;
    path.moveTo(x + cellSize / 2 - topHalf, y);

    for (let step = 1; step <= sampleCount; step++) {
      const position = step / sampleCount;
      const thickness = thicknessAt(position) / 2;
      const sampleY = y + cellSize * position;
      path.lineTo(x + cellSize / 2 - thickness, sampleY);
    }

    for (let step = sampleCount; step >= 0; step--) {
      const position = step / sampleCount;
      const thickness = thicknessAt(position) / 2;
      const sampleY = y + cellSize * position;
      path.lineTo(x + cellSize / 2 + thickness, sampleY);
    }
  } else {
    const leftHalf = thicknessAt(0) / 2;
    path.moveTo(x, y + cellSize / 2 - leftHalf);

    for (let step = 1; step <= sampleCount; step++) {
      const position = step / sampleCount;
      const thickness = thicknessAt(position) / 2;
      const sampleX = x + cellSize * position;
      path.lineTo(sampleX, y + cellSize / 2 - thickness);
    }

    for (let step = sampleCount; step >= 0; step--) {
      const position = step / sampleCount;
      const thickness = thicknessAt(position) / 2;
      const sampleX = x + cellSize * position;
      path.lineTo(sampleX, y + cellSize / 2 + thickness);
    }
  }

  path.closePath();
  return path;
}

function drawPreviewAdaptiveYarn(
  ctx,
  x,
  y,
  cellSize,
  colorValue,
  orientation,
  isTopLayer,
  renderMode,
  cellX,
  cellY,
  states
) {
  const widths = getPreviewLayerWidths(cellSize, renderMode);
  const middleThickness = isTopLayer ? widths.top : widths.under;
  const startThickness = getPreviewBorderThickness(states, cellX, cellY, orientation, isTopLayer, renderMode, cellSize, -1);
  const endThickness = getPreviewBorderThickness(states, cellX, cellY, orientation, isTopLayer, renderMode, cellSize, 1);
  const renderThickness = Math.max(startThickness, middleThickness, endThickness);
  const path = buildPreviewThreadPath(x, y, cellSize, orientation, startThickness, middleThickness, endThickness);

  ctx.save();
  ctx.clip(path);

  if (renderMode === "ultra") {
    const yarnTrackIndex = orientation === "vertical" ? cellX : cellY;
    const tileLength = Math.max(1, (orientation === "vertical" ? picks : warp) * cellSize);
    drawUltraPreviewThreadBand(
      ctx,
      x,
      y,
      cellSize,
      cellSize,
        colorValue,
        orientation,
        isTopLayer,
        yarnTrackIndex,
        tileLength,
        renderThickness
      );
    } else {
      drawPreviewThreadBand(ctx, x, y, cellSize, cellSize, colorValue, orientation, isTopLayer, renderThickness);
    }

  ctx.restore();
}

function drawPreviewStructuredCell(
  ctx,
  x,
  y,
  cellSize,
  cellState,
  cellX,
  cellY,
  states,
  renderMode,
  backgroundColor = defaultPreviewBackgroundColor
) {
  const topColor = cellState.frontColor || "#ffffff";
  const underColor = cellState.backColor || topColor;
  const topOrientation = cellState.warpVisibleOnFront ? "vertical" : "horizontal";
  const underOrientation = topOrientation === "vertical" ? "horizontal" : "vertical";

  ctx.fillStyle = backgroundColor;
  ctx.fillRect(x, y, cellSize, cellSize);

  drawPreviewAdaptiveYarn(ctx, x, y, cellSize, underColor, underOrientation, false, renderMode, cellX, cellY, states);

  if (renderMode === "ultra") {
    if (cellSize >= 7) {
      drawUltraPreviewIntersectionShadow(ctx, x, y, cellSize, topOrientation);
    }
  } else if (cellSize >= 6) {
    drawPreviewIntersectionShadow(ctx, x, y, cellSize, topOrientation);
  }

  drawPreviewAdaptiveYarn(ctx, x, y, cellSize, topColor, topOrientation, true, renderMode, cellX, cellY, states);
}

function buildPreviewStateGrid() {
  return Array.from({ length: picks }, (_, pickIndex) =>
    Array.from({ length: warp }, (_, warpIndex) => getDrawdownCellState(pickIndex, warpIndex))
  );
}

function drawContinuousPreviewTextile(ctx, states, cellSize, renderMode) {
  const isUltra = renderMode === "ultra";
  const tileLengthVertical = Math.max(1, picks * cellSize);
  const tileLengthHorizontal = Math.max(1, warp * cellSize);
  const drawBand = (x, y, spanLength, colorValue, orientation, isTopLayer, trackIndex) => {
    if (isUltra) {
      drawUltraPreviewThreadBand(
        ctx,
        x,
        y,
        cellSize,
        spanLength,
        colorValue,
        orientation,
        isTopLayer,
        trackIndex,
        orientation === "vertical" ? tileLengthVertical : tileLengthHorizontal
      );
    } else {
      drawPreviewThreadBand(ctx, x, y, cellSize, spanLength, colorValue, orientation, isTopLayer);
    }
  };

  for (let pickIndex = 0; pickIndex < picks; pickIndex++) {
    let warpIndex = 0;
    while (warpIndex < warp) {
      if (!states[pickIndex][warpIndex].warpVisibleOnFront) {
        warpIndex++;
        continue;
      }
      const start = warpIndex;
      const colorValue = states[pickIndex][warpIndex].backColor || "#ffffff";
      while (warpIndex < warp && states[pickIndex][warpIndex].warpVisibleOnFront) {
        warpIndex++;
      }
      drawBand(start * cellSize, pickIndex * cellSize, (warpIndex - start) * cellSize, colorValue, "horizontal", false, pickIndex);
    }
  }

  for (let warpIndex = 0; warpIndex < warp; warpIndex++) {
    let pickIndex = 0;
    while (pickIndex < picks) {
      if (states[pickIndex][warpIndex].warpVisibleOnFront) {
        pickIndex++;
        continue;
      }
      const start = pickIndex;
      const colorValue = states[pickIndex][warpIndex].backColor || "#ffffff";
      while (pickIndex < picks && !states[pickIndex][warpIndex].warpVisibleOnFront) {
        pickIndex++;
      }
      drawBand(warpIndex * cellSize, start * cellSize, (pickIndex - start) * cellSize, colorValue, "vertical", false, warpIndex);
    }
  }

  for (let pickIndex = 0; pickIndex < picks; pickIndex++) {
    for (let warpIndex = 0; warpIndex < warp; warpIndex++) {
      const topOrientation = states[pickIndex][warpIndex].warpVisibleOnFront ? "vertical" : "horizontal";
      if (isUltra) {
        drawUltraPreviewIntersectionShadow(ctx, warpIndex * cellSize, pickIndex * cellSize, cellSize, topOrientation);
      } else {
        drawPreviewIntersectionShadow(ctx, warpIndex * cellSize, pickIndex * cellSize, cellSize, topOrientation);
      }
    }
  }

  for (let pickIndex = 0; pickIndex < picks; pickIndex++) {
    let warpIndex = 0;
    while (warpIndex < warp) {
      if (states[pickIndex][warpIndex].warpVisibleOnFront) {
        warpIndex++;
        continue;
      }
      const start = warpIndex;
      const colorValue = states[pickIndex][warpIndex].frontColor || "#ffffff";
      while (warpIndex < warp && !states[pickIndex][warpIndex].warpVisibleOnFront) {
        warpIndex++;
      }
      drawBand(start * cellSize, pickIndex * cellSize, (warpIndex - start) * cellSize, colorValue, "horizontal", true, pickIndex);
    }
  }

  for (let warpIndex = 0; warpIndex < warp; warpIndex++) {
    let pickIndex = 0;
    while (pickIndex < picks) {
      if (!states[pickIndex][warpIndex].warpVisibleOnFront) {
        pickIndex++;
        continue;
      }
      const start = pickIndex;
      const colorValue = states[pickIndex][warpIndex].frontColor || "#ffffff";
      while (pickIndex < picks && states[pickIndex][warpIndex].warpVisibleOnFront) {
        pickIndex++;
      }
      drawBand(warpIndex * cellSize, start * cellSize, (pickIndex - start) * cellSize, colorValue, "vertical", true, warpIndex);
    }
  }
}

function buildPreviewRepeatTile(cellSize, renderScale, backgroundColor, renderMode) {
  const tileWidth = Math.max(1, warp * cellSize);
  const tileHeight = Math.max(1, picks * cellSize);
  const tileCanvas = document.createElement("canvas");
  const tileCtx = tileCanvas.getContext("2d");
  const drawCell =
    renderMode === "plain"
      ? drawPreviewPlainCell
      : renderMode === "ultra"
        ? drawPreviewUltraWovenCell
        : drawPreviewWovenCell;

  tileCanvas.width = Math.max(1, Math.round(tileWidth * renderScale));
  tileCanvas.height = Math.max(1, Math.round(tileHeight * renderScale));

  tileCtx.setTransform(renderScale, 0, 0, renderScale, 0, 0);
  tileCtx.imageSmoothingEnabled = true;
  if ("imageSmoothingQuality" in tileCtx) {
    tileCtx.imageSmoothingQuality = "high";
  }

  tileCtx.clearRect(0, 0, tileWidth, tileHeight);
  tileCtx.fillStyle = backgroundColor;
  tileCtx.fillRect(0, 0, tileWidth, tileHeight);

  const states = buildPreviewStateGrid();

  if (renderMode === "plain") {
    for (let y = 0; y < picks; y++) {
      for (let x = 0; x < warp; x++) {
        drawCell(tileCtx, x * cellSize, y * cellSize, cellSize, states[y][x], x, y, backgroundColor);
      }
    }
  } else {
    for (let y = 0; y < picks; y++) {
      for (let x = 0; x < warp; x++) {
        drawPreviewStructuredCell(
          tileCtx,
          x * cellSize,
          y * cellSize,
          cellSize,
          states[y][x],
          x,
          y,
          states,
          renderMode,
          backgroundColor
        );
      }
    }
  }

  return { tileCanvas, tileWidth, tileHeight };
}

function getNextPatternColorValue() {
  const seedIndex = (nextPatternColorNumber - (defaultPatternColors.length + 1)) % patternColorSeedValues.length;
  return patternColorSeedValues[seedIndex];
}

function updatePatternColorSelectionUI() {
  const activeColorId = getSelectedPatternColorId();
  document.querySelectorAll("#pattern-colors .pattern-color-item").forEach(item => {
    const isActive = item.dataset.colorId === activeColorId;
    item.classList.toggle("active", isActive);
  });
}

function isPatternColorInUse(colorId) {
  return threading.some(row => row?.includes(colorId)) || treadling.some(row => row?.includes(colorId));
}

function canDeletePatternColor(colorId) {
  return patternColors.length > 1 && !isPatternColorInUse(colorId);
}

function createPatternColorDeleteButton(colorId) {
  const deleteButton = document.createElement("button");
  deleteButton.type = "button";
  deleteButton.className = "pattern-color-delete";
  deleteButton.setAttribute("aria-label", "Delete unused pattern color");
  deleteButton.innerHTML = `
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M18 6 6 18"></path>
      <path d="m6 6 12 12"></path>
    </svg>
  `;
  deleteButton.onclick = event => {
    event.stopPropagation();
    deletePatternColor(colorId);
  };
  return deleteButton;
}

function syncPatternColorUsageUI() {
  const container = document.getElementById("pattern-colors");

  container.querySelectorAll(".pattern-color-item").forEach(item => {
    const colorId = item.dataset.colorId;
    const existingDeleteButton = item.querySelector(".pattern-color-delete");
    const shouldShowDeleteButton = canDeletePatternColor(colorId);

    if (shouldShowDeleteButton && !existingDeleteButton) {
      item.appendChild(createPatternColorDeleteButton(colorId));
    } else if (!shouldShowDeleteButton && existingDeleteButton) {
      existingDeleteButton.remove();
    }
  });
}

function deletePatternColor(colorId) {
  if (!canDeletePatternColor(colorId)) {
    return;
  }

  patternColors = patternColors.filter(color => color.id !== colorId);

  if (activePatternColorId === colorId) {
    activePatternColorId = patternColors[0]?.id || null;
  }

  renderPatternColors();
  renderAll();
}

function renderPatternColors() {
  const container = document.getElementById("pattern-colors");
  container.innerHTML = "";

  patternColors.forEach((color, index) => {
    const item = document.createElement("div");
    item.className = "pattern-color-item";
    item.dataset.colorId = color.id;
    item.title = `Select pattern color ${index + 1}`;
    item.style.backgroundColor = color.value;
    item.onclick = () => {
      activePatternColorId = color.id;
      updatePatternColorSelectionUI();
    };

    const surface = document.createElement("span");
    surface.className = "pattern-color-surface";
    surface.style.backgroundColor = color.value;

    const input = document.createElement("input");
    input.type = "color";
    input.className = "pattern-color-input";
    input.value = color.value;
    input.setAttribute("aria-label", `Edit pattern color ${index + 1}`);
    input.addEventListener("focus", () => {
      activePatternColorId = color.id;
      updatePatternColorSelectionUI();
    });
    input.addEventListener("input", () => {
      color.value = input.value;
      item.style.backgroundColor = color.value;
      surface.style.backgroundColor = color.value;
      activePatternColorId = color.id;
      updatePatternColorSelectionUI();
      renderAll();
    });

    const editButton = document.createElement("button");
    editButton.type = "button";
    editButton.className = "pattern-color-edit";
    editButton.setAttribute("aria-label", `Edit pattern color ${index + 1}`);
    editButton.innerHTML = `
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M12 20h9"></path>
        <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
      </svg>
    `;
    editButton.onclick = event => {
      event.stopPropagation();
      activePatternColorId = color.id;
      updatePatternColorSelectionUI();
      input.click();
    };

    item.appendChild(surface);
    item.appendChild(input);
    item.appendChild(editButton);
    container.appendChild(item);
  });

  syncPatternColorUsageUI();
  updatePatternColorSelectionUI();
}

function addPatternColor() {
  const nextColorValue = getNextPatternColorValue();
  const color = {
    id: `pattern-color-${nextPatternColorNumber++}`,
    value: nextColorValue
  };
  patternColors.push(color);
  activePatternColorId = color.id;
  renderPatternColors();
  renderAll();
}

function sanitizePositiveIntegerInput(input) {
  const digitsOnly = input.value.replace(/[^\d]/g, "");
  const nextValue = Math.max(1, Number.parseInt(digitsOnly || "1", 10));
  input.value = nextValue;
  return nextValue;
}

function getControlValues() {
  const [nextShafts, nextTreadles, nextWarp, nextPicks] = controlIds.map(id =>
    sanitizePositiveIntegerInput(document.getElementById(id))
  );

  return {
    shafts: nextShafts,
    treadles: nextTreadles,
    warp: nextWarp,
    picks: nextPicks
  };
}

function getPreviewRepeatValues() {
  const [repeatX, repeatY] = previewControlIds.map(id =>
    sanitizePositiveIntegerInput(document.getElementById(id))
  );

  return { repeatX, repeatY };
}
