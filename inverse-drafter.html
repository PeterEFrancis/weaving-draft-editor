  const treadleKeyMap = new Map();
  const oldToNew = Array(tieup.length).fill(0);

  tieup.forEach((row, treadleIndex) => {
    const key = row.join("");
    if (!treadleKeyMap.has(key)) {
      treadleKeyMap.set(key, treadleKeyMap.size);
    }
    oldToNew[treadleIndex] = treadleKeyMap.get(key);
  });

  const mergedTieup = Array.from(treadleKeyMap.keys(), key => key.split("").map(value => (value === "1" ? 1 : 0)));

  return {
    tieup: mergedTieup,
    rowAssignments: rowAssignments.map(groupIndex => oldToNew[groupIndex])
  };
}

function buildDraftFromAssignments(matrix, rowAssignments, columnAssignments, tieup, label = "Approximate") {
  let normalized = trimGroupsToAssignments(rowAssignments, columnAssignments, tieup);
  let merged = mergeDuplicateShafts(normalized.tieup, normalized.columnAssignments);
  normalized = trimGroupsToAssignments(normalized.rowAssignments, merged.columnAssignments, merged.tieup);
  merged = mergeDuplicateTreadles(normalized.tieup, normalized.rowAssignments);
  normalized = trimGroupsToAssignments(merged.rowAssignments, normalized.columnAssignments, merged.tieup);

  const shafts = Math.max(1, normalized.tieup[0]?.length || 0);
  const threading = Array.from({ length: shafts }, () => Array(warp).fill(0));
  normalized.columnAssignments.forEach((shaftIndex, column) => {
    threading[shaftIndex][column] = 1;
  });

  const finalTieupStats = computeTieupStatsFromAssignments(
    matrix,
    normalized.rowAssignments,
    normalized.columnAssignments,
    Math.max(1, normalized.tieup.length || 0),
    shafts
  );
  const resolvedTieup = chooseAmbiguousTieupValuesForClothlike(
    matrix,
    normalized.rowAssignments,
    normalized.columnAssignments,
    finalTieupStats.tieup,
    finalTieupStats.ambiguous
  );
  const rowPatterns = Array.from({ length: picks }, (_, row) =>
    resolvedTieup.tieup[normalized.rowAssignments[row]]?.slice() || Array(shafts).fill(0)
  );
  const originalTreadleCount = Math.max(1, resolvedTieup.tieup.length || 0);
  const oneHot = buildOneHotTreadleRepresentation(rowPatterns);
  let selected = compressTreadleRepresentation(rowPatterns, maxPressedTreadles, originalTreadleCount);
  if (!selected) {
    selected = oneHot.tieup.length <= maxTreadles ? oneHot : null;
  }
  if (!selected) {
    return null;
  }

  const compressedTieup = selected.tieup;
  const treadling = selected.treadling;
  const treadles = Math.max(1, compressedTieup.length || 0);
  const drawdown = rebuildDrawdown(threading, compressedTieup, treadling);
  const mismatchCount = countMatrixMismatches(matrix, drawdown);
  const exactMatch = mismatchCount === 0;
  const clothlikeAnalysis = computeDrawdownClothlikeAnalysis(drawdown, floatTolerance);

  return {
    label,
    shafts,
    treadles,
    threading,
    tieup: compressedTieup,
    ambiguousTieup: createMatrix(treadles, shafts, false),
    treadling,
    drawdown,
    mismatchCount,
    exactMatch,
    matchRatio: getMatchRatio(matrix, mismatchCount),
    clothlikeAnalysis,
    signature: serializeDraftSignature({ threading, tieup: compressedTieup, treadling }),
    maxPressedUsed: selected.maxPressedUsed || 0
  };
}

function optimizeApproximateDraft(matrix, shaftCount, treadleCount, columnStrategy, rowStrategy, seed = 1) {
  const columnVectors = getColumnVectors(matrix);
  const rowVectors = getRowVectors(matrix);
  let columnAssignments = createInitialAssignments(columnVectors, shaftCount, columnStrategy, seed);
  let rowAssignments = createInitialAssignments(rowVectors, treadleCount, rowStrategy, seed + 17);
  const iterationLimit = warp * picks > 9000 ? 6 : 10;
  let signature = "";

  for (let iteration = 0; iteration < iterationLimit; iteration++) {
    let tieup = computeTieupStatsFromAssignments(matrix, rowAssignments, columnAssignments, treadleCount, shaftCount).tieup;
    rowAssignments = updateRowAssignments(matrix, tieup, columnAssignments, treadleCount, rowAssignments);
    tieup = computeTieupStatsFromAssignments(matrix, rowAssignments, columnAssignments, treadleCount, shaftCount).tieup;
    columnAssignments = updateColumnAssignments(matrix, tieup, rowAssignments, shaftCount, columnAssignments);
    tieup = computeTieupStatsFromAssignments(matrix, rowAssignments, columnAssignments, treadleCount, shaftCount).tieup;

    const nextSignature = `${rowAssignments.join(",")}|${columnAssignments.join(",")}|${tieup.flat().join("")}`;
    if (nextSignature === signature) {
      break;
    }
    signature = nextSignature;
  }

  const finalTieup = computeTieupStatsFromAssignments(matrix, rowAssignments, columnAssignments, treadleCount, shaftCount).tieup;
  return buildDraftFromAssignments(matrix, rowAssignments, columnAssignments, finalTieup, "Approximate");
}

function decorateDraftOptionForTarget(option, originalMatrix, repairResult) {
  if (!option) {
    return null;
  }
  const mismatchCount = countMatrixMismatches(originalMatrix, option.drawdown);
  return {
    ...option,
    exactMatch: mismatchCount === 0,
    mismatchCount,
    matchRatio: getMatchRatio(originalMatrix, mismatchCount),
    engineMetrics: computeDraftEngineMetrics(originalMatrix, option.drawdown),
    clothlikeAnalysis: computeDrawdownClothlikeAnalysis(option.drawdown, floatTolerance),
    repairedCellCount: repairResult.repairedCellCount,
    repairTolerance: floatTolerance
  };
}

function buildConstrainedDraftOptions(matrix, shaftLimit, treadleLimit) {
  const repairResult = useFloatToleranceInOptimization
    ? repairMatrixFloatStress(matrix, floatTolerance)
    : {
        matrix,
        repairedCellCount: 0,
        clothlikeAnalysis: computeDrawdownClothlikeAnalysis(matrix, floatTolerance)
      };
  const optimizationMatrix = repairResult.matrix;
  const exactDraft = decorateDraftOptionForTarget(generateExactDraftFromDrawdown(optimizationMatrix), matrix, repairResult);
  exactRequirements = {
    shafts: exactDraft.shafts,
    treadles: exactDraft.treadles,
    pressed: Math.max(1, exactDraft.maxPressedUsed || 1)
  };

  if (
    exactDraft.shafts <= shaftLimit &&
    exactDraft.treadles <= treadleLimit &&
    exactDraft.maxPressedUsed <= maxPressedTreadles
  ) {
    return [exactDraft];
  }

  const clampedShaftLimit = Math.max(1, Math.min(shaftLimit, optimizationMatrix[0]?.length || 1));
  const clampedTreadleLimit = Math.max(1, Math.min(treadleLimit, optimizationMatrix.length || 1));
  const configs = [
    { shafts: clampedShaftLimit, treadles: clampedTreadleLimit, columnStrategy: "farthest", rowStrategy: "farthest", seed: 11 },
    { shafts: clampedShaftLimit, treadles: clampedTreadleLimit, columnStrategy: "density", rowStrategy: "density", seed: 23 },
    { shafts: clampedShaftLimit, treadles: clampedTreadleLimit, columnStrategy: "random", rowStrategy: "farthest", seed: 31 },
    { shafts: clampedShaftLimit, treadles: clampedTreadleLimit, columnStrategy: "farthest", rowStrategy: "random", seed: 37 },
    { shafts: clampedShaftLimit, treadles: clampedTreadleLimit, columnStrategy: "density", rowStrategy: "random", seed: 43 },
    { shafts: Math.max(1, clampedShaftLimit - 1), treadles: clampedTreadleLimit, columnStrategy: "density", rowStrategy: "farthest", seed: 41 },
    { shafts: clampedShaftLimit, treadles: Math.max(1, clampedTreadleLimit - 1), columnStrategy: "farthest", rowStrategy: "density", seed: 53 },
    { shafts: clampedShaftLimit, treadles: clampedTreadleLimit, columnStrategy: "random", rowStrategy: "random", seed: 67 },
    { shafts: Math.max(1, clampedShaftLimit - 1), treadles: Math.max(1, clampedTreadleLimit - 1), columnStrategy: "random", rowStrategy: "random", seed: 71 },
    { shafts: Math.max(1, clampedShaftLimit - 2), treadles: clampedTreadleLimit, columnStrategy: "farthest", rowStrategy: "random", seed: 79 },
    { shafts: clampedShaftLimit, treadles: Math.max(1, clampedTreadleLimit - 2), columnStrategy: "random", rowStrategy: "density", seed: 83 }
  ].filter(
    (config, index, array) =>
      config.shafts >= 1 &&
      config.treadles >= 1 &&
      array.findIndex(other =>
        other.shafts === config.shafts &&
        other.treadles === config.treadles &&
        other.columnStrategy === config.columnStrategy &&
        other.rowStrategy === config.rowStrategy
      ) === index
  );

  const candidateMap = new Map();

  configs.forEach(config => {
    const candidate = decorateDraftOptionForTarget(
      optimizeApproximateDraft(optimizationMatrix, config.shafts, config.treadles, config.columnStrategy, config.rowStrategy, config.seed),
      matrix,
      repairResult
    );

    if (!candidate) {
      return;
    }
    if (candidate.treadles > treadleLimit || candidate.shafts > shaftLimit || candidate.maxPressedUsed > maxPressedTreadles) {
      return;
    }

    if (!candidateMap.has(candidate.signature)) {
      candidateMap.set(candidate.signature, candidate);
      return;
    }

    const existing = candidateMap.get(candidate.signature);
    if (
      compareDraftEngineMetrics(candidate, existing) < 0 ||
      (compareDraftEngineMetrics(candidate, existing) === 0 && candidate.shafts + candidate.treadles < existing.shafts + existing.treadles)
    ) {
      candidateMap.set(candidate.signature, candidate);
    }
  });

  const allCandidates = Array.from(candidateMap.values()).sort((left, right) => {
    if (useFloatToleranceInOptimization) {
      const floatComparison =
        Math.max(0, left.clothlikeAnalysis.worstFloatLength - floatTolerance) -
        Math.max(0, right.clothlikeAnalysis.worstFloatLength - floatTolerance);
      if (floatComparison !== 0) {
        return floatComparison;
      }
    }

    return (
      compareDraftEngineMetrics(left, right) ||
      (left.shafts + left.treadles) - (right.shafts + right.treadles) ||
      right.matchRatio - left.matchRatio
    );
  });

  if (!allCandidates.length) {
    return [exactDraft];
  }

  if (!useFloatToleranceInOptimization) {
    return allCandidates.slice(0, maxGeneratedOptions);
  }

  const stressSafeCandidates = allCandidates.filter(candidate => candidate.clothlikeAnalysis.worstFloatLength <= floatTolerance);
  return (stressSafeCandidates.length ? stressSafeCandidates : allCandidates).slice(0, maxGeneratedOptions);
}

function renderGeneratedOptionButtons() {
  const optionList = document.getElementById("option-list");
  optionList.innerHTML = "";

  generatedOptions.forEach((option, optionIndex) => {
    const button = document.createElement("button");
    button.type = "button";
    button.className = "option-button";
    button.classList.toggle("active", optionIndex === selectedOptionIndex);
    button.textContent = `Option ${optionIndex + 1}`;
    button.addEventListener("click", () => {
      selectedOptionIndex = optionIndex;
      renderSelectedGeneratedOption();
    });
    optionList.appendChild(button);
  });

  scheduleFlowOverlayRender();
}

function renderSelectedGeneratedOption() {
  const option = generatedOptions[selectedOptionIndex] || generatedOptions[0];
  if (!option) {
    return;
  }
  const generatedStressAnalysis = showTargetStressOverlay
    ? computeDrawdownClothlikeAnalysis(option.drawdown, floatTolerance)
    : null;

  renderMatrixGrid(
    document.getElementById("generated-threading"),
    option.shafts,
    warp,
    (row, column) => {
      const shaft = option.shafts - 1 - row;
      return option.threading[shaft]?.[column];
    }
  );

  renderMatrixGrid(
    document.getElementById("generated-tieup"),
    option.shafts,
    option.treadles,
    (row, column) => {
      const shaft = option.shafts - 1 - row;
      return option.tieup[column]?.[shaft];
    },
    (row, column) => {
      const shaft = option.shafts - 1 - row;
      return option.ambiguousTieup?.[column]?.[shaft] ? "draft-cell-ambiguous" : "";
    },
    (row, column) => {
      const shaft = option.shafts - 1 - row;
      return option.ambiguousTieup?.[column]?.[shaft]
        ? (useFloatToleranceInOptimization
            ? `Ambiguous tie cell: chosen to improve cloth-likeness at tolerance ${floatTolerance}.`
            : "Ambiguous tie cell: chosen to improve cloth-likeness without tolerance optimization.")
        : "";
    }
  );

  renderMatrixGrid(
    document.getElementById("generated-drawdown"),
    picks,
    warp,
    (row, column) => option.drawdown[row]?.[column],
    (row, column) => {
      const severity = generatedStressAnalysis?.severityMap[row]?.[column] || 0;
      return generatedStressAnalysis && severity > 0 ? "draft-cell-stress" : "";
    },
    (row, column) => {
      const severity = generatedStressAnalysis?.severityMap[row]?.[column] || 0;
      return generatedStressAnalysis && severity > 0
        ? `Float stress severity ${(severity * 100).toFixed(0)}% at tolerance ${floatTolerance}.`
        : "";
    },
    (cell, row, column) => {
      const severity = generatedStressAnalysis?.severityMap[row]?.[column] || 0;
      if (generatedStressAnalysis && severity > 0) {
        cell.style.setProperty("--stress-alpha", `${Math.min(0.72, severity * 0.78)}`);
      }
    }
  );

  renderMatrixGrid(
    document.getElementById("generated-treadling"),
    picks,
    option.treadles,
    (row, column) => option.treadling[row]?.[column]
  );

  const shaftLabel = `${option.shafts} shaft${option.shafts === 1 ? "" : "s"}`;
  const treadleLabel = `${option.treadles} treadle${option.treadles === 1 ? "" : "s"}`;
  const matchLabel = option.exactMatch
    ? "Exact match"
    : `${(option.matchRatio * 100).toFixed(1)}% match (${option.mismatchCount} off)`;
  const clothlikeLabel = `${option.clothlikeAnalysis?.score ?? 100}% Cloth-like`;
  const worstWarpFloat = option.clothlikeAnalysis?.worstWarpFloatLength ?? option.clothlikeAnalysis?.worstFloatLength ?? 1;
  const worstWeftFloat = option.clothlikeAnalysis?.worstWeftFloatLength ?? option.clothlikeAnalysis?.worstFloatLength ?? 1;
  const worstFloatLabel = `Worst float ${worstWarpFloat} / ${worstWeftFloat} · Tol ${floatTolerance}`;
  document.getElementById("generated-info-1").textContent = `${shaftLabel} · ${treadleLabel}`;
  document.getElementById("generated-info-2").textContent = matchLabel;
  document.getElementById("generated-info-3").textContent = clothlikeLabel;
  document.getElementById("generated-info-4").textContent = worstFloatLabel;
  document.getElementById("generated-info-5").textContent =
    exactRequirements.shafts <= maxShafts &&
    exactRequirements.treadles <= maxTreadles &&
    exactRequirements.pressed <= maxPressedTreadles
      ? "Exact fits current limits"
      : `${useFloatToleranceInOptimization ? "Tolerance-aware" : "Exact"} needs ${exactRequirements.shafts}S / ${exactRequirements.treadles}T / ${exactRequirements.pressed}P`;

  document.querySelectorAll("#option-list .option-button").forEach((button, buttonIndex) => {
    button.classList.toggle("active", buttonIndex === selectedOptionIndex);
  });

  updateTargetGridDecorations();
  scheduleFlowOverlayRender();
}

function renderGeneratedDraft({ preserveSignature = true } = {}) {
  const previousSignature = preserveSignature
    ? (generatedOptions[selectedOptionIndex]?.signature || null)
    : null;
  generatedOptions = buildConstrainedDraftOptions(targetDrawdown, maxShafts, maxTreadles);
  if (previousSignature) {
    const matchingIndex = generatedOptions.findIndex(option => option.signature === previousSignature);
    selectedOptionIndex = matchingIndex >= 0 ? matchingIndex : 0;
  } else {
    selectedOptionIndex = 0;
  }
  renderGeneratedOptionButtons();
  renderSelectedGeneratedOption();
}

function scheduleGeneratedRender() {
  if (queuedGeneratedRender) {
    return;
  }
  queuedGeneratedRender = true;
  const shouldResetSelection = queuedGeneratedRenderResetSelection;
  window.requestAnimationFrame(() => {
    queuedGeneratedRender = false;
    const resetSelection = queuedGeneratedRenderResetSelection || shouldResetSelection;
    queuedGeneratedRenderResetSelection = false;
    if (resetSelection) {
      selectedOptionIndex = 0;
    }
    renderGeneratedDraft({ preserveSignature: !resetSelection });
  });
}

function createSvgNode(tagName, attributes = {}) {
  const node = document.createElementNS("http://www.w3.org/2000/svg", tagName);
  Object.entries(attributes).forEach(([name, value]) => {
    node.setAttribute(name, String(value));
  });
  return node;
}

function getRelativeBox(element, containerRect) {
  if (!element) {
    return null;
  }
  const rect = element.getBoundingClientRect();
  return {
    left: rect.left - containerRect.left,
    top: rect.top - containerRect.top,
    right: rect.right - containerRect.left,
    bottom: rect.bottom - containerRect.top,
    width: rect.width,
    height: rect.height,
    centerX: rect.left - containerRect.left + rect.width / 2,
    centerY: rect.top - containerRect.top + rect.height / 2
  };
}

function getPanelPortY(box, fallbackOffset = 68) {
  return Math.min(box.bottom - 28, box.top + Math.min(fallbackOffset, Math.max(48, box.height * 0.2)));
}

function buildFlowCurve(startX, startY, endX, endY, intensity = 0.46) {
  const deltaX = endX - startX;
  const handle = Math.max(22, Math.abs(deltaX) * intensity);
  return `M ${startX} ${startY} C ${startX + handle} ${startY}, ${endX - handle} ${endY}, ${endX} ${endY}`;
}

function renderFlowOverlay() {
  const container = document.getElementById("inverse-content-grid");
  const overlay = document.getElementById("flow-overlay");
  const targetPanel = document.getElementById("target-panel");
  const optimizerPanel = document.getElementById("optimizer-panel");
  const optionRail = document.getElementById("option-rail");
  const generatedPanel = document.getElementById("generated-panel");

  if (!container || !overlay || !targetPanel || !optimizerPanel || !optionRail || !generatedPanel) {
    return;
  }

  if (window.innerWidth <= 1100) {
    overlay.replaceChildren();
    return;
  }

  const containerRect = container.getBoundingClientRect();
  const targetBox = getRelativeBox(targetPanel, containerRect);
  const optimizerBox = getRelativeBox(optimizerPanel, containerRect);
  const optionRailBox = getRelativeBox(optionRail, containerRect);
  const generatedBox = getRelativeBox(generatedPanel, containerRect);
  const optionButtons = Array.from(document.querySelectorAll("#option-list .option-button"));

  if (!targetBox || !optimizerBox || !optionRailBox || !generatedBox || !optionButtons.length) {
    overlay.replaceChildren();
    return;
  }

  overlay.setAttribute("viewBox", `0 0 ${containerRect.width} ${containerRect.height}`);
  overlay.setAttribute("width", `${containerRect.width}`);
  overlay.setAttribute("height", `${containerRect.height}`);
  overlay.replaceChildren();

  const optionButtonBoxes = optionButtons
    .map(button => getRelativeBox(button, containerRect))
    .filter(Boolean);

  if (!optionButtonBoxes.length) {
    return;
  }

  const selectedButtonBox = optionButtonBoxes[Math.max(0, Math.min(selectedOptionIndex, optionButtonBoxes.length - 1))];
  const targetPortX = targetBox.right - 10;
  const targetPortY = getPanelPortY(targetBox, 74);
  const optimizerPortX = optimizerBox.left + 10;
  const optimizerPortY = getPanelPortY(optimizerBox, 68);
  const optimizerExitX = optimizerBox.right - 10;
  const optimizerExitY = Math.min(optimizerBox.bottom - 26, optimizerBox.top + 96);
  const generatedPortX = generatedBox.left + 10;
  const generatedPortY = getPanelPortY(generatedBox, 82);
  const branchSpread = Math.min(68, Math.max(24, (optionButtonBoxes.length - 1) * 9));
  const branchStartTop = Math.max(optimizerBox.top + 42, optimizerExitY - branchSpread);
  const branchStartBottom = Math.min(optimizerBox.bottom - 36, optimizerExitY + branchSpread);

  overlay.appendChild(createSvgNode("path", {
    class: "flow-path flow-path-target",
    d: buildFlowCurve(targetPortX, targetPortY, optimizerPortX, optimizerPortY, 0.38)
  }));

  optionButtonBoxes.forEach((box, optionIndex) => {
    const isActive = optionIndex === selectedOptionIndex;
    const optionEntryX = box.left + 1;
    const branchProgress = optionButtonBoxes.length <= 1
      ? 0.5
      : optionIndex / (optionButtonBoxes.length - 1);
    const optimizerBranchStartY =
      branchStartTop + (branchStartBottom - branchStartTop) * branchProgress;
    overlay.appendChild(createSvgNode("path", {
      class: `flow-path ${isActive ? "flow-path-branch-active" : "flow-path-branch"}`,
      d: buildFlowCurve(optimizerExitX, optimizerBranchStartY, optionEntryX, box.centerY, 0.34)
    }));
  });

  overlay.appendChild(createSvgNode("path", {
    class: "flow-path flow-path-active",
    d: buildFlowCurve(selectedButtonBox.right - 1, selectedButtonBox.centerY, generatedPortX, generatedPortY, 0.34)
  }));
}

function scheduleFlowOverlayRender() {
  if (queuedFlowOverlayRender) {
    return;
  }
  queuedFlowOverlayRender = true;
  window.requestAnimationFrame(() => {
    queuedFlowOverlayRender = false;
    renderFlowOverlay();
  });
}

}

  button.textContent = showTargetDiffOverlay ? "Hide Diff" : "Show Diff";
}

function syncOptimizationToleranceToggle() {

  button.textContent = useFloatToleranceInOptimization ? "On" : "Off";
}

function syncFloatToleranceControl() {
  const floatToleranceInput = document.getElementById("float-tolerance-input");
  const maxFloatTolerance = getMaxFloatTolerance();
  floatTolerance = Math.max(1, Math.min(floatTolerance, maxFloatTolerance));
  floatToleranceInput.max = String(maxFloatTolerance);
  floatToleranceInput.value = String(floatTolerance);
}

function updateTargetGridDecorations() {
  const selectedOption = generatedOptions[selectedOptionIndex] || null;
  const hasComparableDrawdown =
    selectedOption &&
    Array.isArray(selectedOption.drawdown) &&
    selectedOption.drawdown.length === picks &&
    selectedOption.drawdown[0]?.length === warp;
  const targetAnalysis = showTargetStressOverlay ? computeDrawdownClothlikeAnalysis(targetDrawdown, floatTolerance) : null;

  document.querySelectorAll("#target-grid .draw-cell").forEach(button => {
    const row = Number.parseInt(button.dataset.row || "-1", 10);
    const column = Number.parseInt(button.dataset.column || "-1", 10);
    const severity = targetAnalysis?.severityMap[row]?.[column] || 0;
    const isProblematic =
      hasComparableDrawdown &&
      row >= 0 &&
      column >= 0 &&
      Boolean(targetDrawdown[row]?.[column]) !== Boolean(selectedOption.drawdown[row]?.[column]);

    button.classList.toggle("draw-cell-stress", Boolean(targetAnalysis && severity > 0));
    if (targetAnalysis && severity > 0) {
      button.style.setProperty("--stress-alpha", `${Math.min(0.72, severity * 0.78)}`);
    } else {
      button.style.removeProperty("--stress-alpha");
    }
    button.classList.toggle("draw-cell-problem", Boolean(showTargetDiffOverlay && isProblematic));
  });

  syncTargetStressToggle();
  syncTargetDiffToggle();
  syncOptimizationToleranceToggle();
  scheduleFlowOverlayRender();
}

function clearTargetDrawdown() {
  targetDrawdown = createMatrix(picks, warp, 0);
  renderTargetGrid();
  renderGeneratedDraft();
  pushHistorySnapshot();
}

function invertTargetDrawdown() {
  targetDrawdown = targetDrawdown.map(row => row.map(value => (value ? 0 : 1)));
  renderTargetGrid();
  renderGeneratedDraft();
  pushHistorySnapshot();
}

function confirmInverseResetToDefault() {
  const snapshot = {
    warp: defaultWarp,
    picks: defaultPicks,
    maxShafts: Math.min(defaultMaxShafts, defaultWarp),
    maxTreadles: Math.min(defaultMaxTreadles, defaultPicks),
    maxPressedTreadles: Math.min(defaultMaxPressedTreadles, defaultMaxTreadles),
    optimizerEngine: defaultOptimizerEngine,
    floatTolerance: defaultFloatTolerance,
    useFloatToleranceInOptimization: false,
    showTargetStressOverlay: false,
    showTargetDiffOverlay: false,
    cellSize: defaultCellSize,
    selectedOptionIndex: 0,
    targetDrawdown: createDefaultTargetDrawdown(defaultPicks, defaultWarp)
  };
  applyStateSnapshot(snapshot);
  pushHistorySnapshot();
}

async function saveInverseDraftToFile() {
  const contents = JSON.stringify(buildSaveData(), null, 2);
  const suggestedName = getSuggestedFilename();
  const blob = new Blob([contents], { type: "application/json" });

  if (typeof window.showSaveFilePicker === "function") {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName,
        types: [{
          description: "Inverse weaving draft",
          accept: { "application/json": [".wdi"] }
        }]
      });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      return;
    } catch (error) {
      if (error && error.name === "AbortError") {
        return;
      }
    }
  }

  const fallbackSuggestedName = getSuggestedFilename(true);
  const fallbackName = window.prompt("Save inverse draft as", fallbackSuggestedName);
  if (fallbackName === null) {
    return;
  }
  const trimmed = fallbackName.trim();
  const filename = trimmed
    ? (trimmed.toLowerCase().endsWith(".wdi") ? trimmed : `${trimmed}.wdi`)
    : fallbackSuggestedName;
  const url = URL.createObjectURL(blob);
  const anchor = document.createElement("a");
  anchor.href = url;
  anchor.download = filename;
  document.body.appendChild(anchor);
  anchor.click();
  anchor.remove();
  window.setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function openInverseDraftFilePicker() {
  document.getElementById("inverse-draft-file-input").click();
}

async function handleInverseDraftFileOpen(event) {
  const file = event.target.files?.[0];
  event.target.value = "";
  if (!file) {
    return;
  }

  try {
    const text = await file.text();
    const parsed = JSON.parse(text);
    if (isForwardDraftData(parsed)) {
      const converted = buildInverseDataFromForwardDraft(parsed, { filename: file.name });
      applyLoadedData(converted);
      if (converted.dimensionLimitChanged) {
        showLimitAlert();
      }
    } else {
      applyLoadedData(parsed, {
        draftNameOverride: parsed?.meta?.draftName ? null : getDraftNameFromFilename(file.name)
      });
    }
  } catch (error) {
    window.alert("That file could not be opened.");
  }
}

function buildPrintableMarkup() {
  const generated = document.querySelector(".generated-draft-combined");
  return generated ? generated.outerHTML : "";
}

function printInverseDraft() {
  const markup = buildPrintableMarkup();
  if (!markup) {
    return;
  }

  const cellSize = getCellSize();
  const printWindow = window.open("", "_blank", "noopener,noreferrer");
  if (!printWindow) {
    return;
  }

  printWindow.document.write(`<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inverse Draft Print</title>
<style>
  body { margin: 1rem; font-family: sans-serif; color: #111; }
  .generated-draft-combined { display: grid; grid-template-columns: auto auto; grid-template-areas: "threading tieup" "drawdown treadling"; gap: 0.75em; align-items: start; }
  .generated-section-threading { grid-area: threading; }
  .generated-section-tieup { grid-area: tieup; }
  .generated-section-drawdown { grid-area: drawdown; }
  .generated-section-treadling { grid-area: treadling; }
  .draft-grid { display: grid; gap: 0; }
  .draft-cell { width: ${cellSize}px; height: ${cellSize}px; border: 1px solid rgba(0, 0, 0, 0.3); box-sizing: border-box; background: #fff; }
  .draft-cell.cell-on { background: #111; }
  .draft-cell-ambiguous { outline: 2px dashed rgba(170, 74, 43, 0.7); outline-offset: -3px; }
</style>
</head>
<body>${markup}</body>
</html>`);
  printWindow.document.close();
  printWindow.focus();
  printWindow.print();
  printWindow.close();
}

function isTextEditingTarget(target) {
  if (!target) {
    return false;
  }
  if (target.tagName === "TEXTAREA") {
    return true;
  }
  if (target.tagName === "INPUT") {
    const type = String(target.type || "text").toLowerCase();
    return ["text", "search", "url", "email", "tel", "password"].includes(type);
  }
  return target.isContentEditable;
}

window.addEventListener("pointerup", stopPainting);
window.addEventListener("pointercancel", stopPainting);
window.addEventListener("beforeunload", saveAutosave);
window.addEventListener("resize", scheduleFlowOverlayRender);
window.addEventListener("keydown", event => {
  const modifier = event.metaKey || event.ctrlKey;
  if (!modifier) {
    return;
  }
  if (isTextEditingTarget(event.target)) {
    return;
  }

  const key = String(event.key || "").toLowerCase();
  const isUndoShortcut = key === "z" && !event.shiftKey;
  const isRedoShortcut = (key === "z" && event.shiftKey) || key === "y";
  if (!isUndoShortcut && !isRedoShortcut) {
    return;
  }
  event.preventDefault();
  if (isUndoShortcut) {
    undoInverseChange();
  } else {
    redoInverseChange();
  }
});

setDraftName(restoreActiveDraftName());

if (autosave) {
  try {
    applyLoadedData(autosave, { draftNameOverride: autosave?.meta?.draftName || restoreActiveDraftName() });
  } catch (error) {
    applyStateSnapshot(captureSnapshotDefaults({

    }));
